<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #fdfbf9;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        .portrait-frame::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid #7dd3fc; 
            z-index: -1;
        }

        .hero-text-shadow {
            text-shadow: 2px 4px 12px rgba(0,0,0,0.4);
        }

        .artwork-footer-bg {
            /* Using the requested art piece as a PNG background */
            background-image: linear-gradient(rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.45)), url('Pasted image (16).png');
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            const SOCIAL_LINKS = {
                facebook: "https://www.facebook.com/victoriawallaceartist",
                instagram: "https://www.instagram.com/victoriawallace.artist?fbclid=IwY2xjawRn2wFleHRuA2FlbQIxMABicmlkETFsd0VDNURQQUhTdGJ0R0dPc3J0YwZhcHBfaWQQMjIyMDM5MTc4ODIwMDg5MgABHrPaQG5xMsoRvUaLgVk0jSXPiXOHavwumoOgAOyXaBSm1oc3jzOcs3AJUWSV_aem_bFt4QEBbVst6x28nyH0w1Q"
            };

            const PHONE_NUMBER = "(705) 559-5509";

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('Name');
                const email = formData.get('Email');
                const phone = formData.get('Phone') || 'Not provided';
                const message = formData.get('Message');

                const subject = encodeURIComponent(`Website Inquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\nPhone: ${phone}\n\nMessage:\n${message}`);

                window.location.href = `mailto:Victoriawallaceartist@gmail.com?subject=${subject}&body=${body}`;
            };

            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée' }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Limited edition archival quality reproductions available now.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for current availability.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-sky-500 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                                <div className="flex gap-4 pl-4 border-l border-white/20">
                                    <a href={SOCIAL_LINKS.instagram} target="_blank" className={`${isScrolled ? 'text-stone-600' : 'text-white'} hover:text-sky-400 transition-colors`}>
                                        <i data-lucide="instagram" className="w-4 h-4"></i>
                                    </a>
                                    <a href={SOCIAL_LINKS.facebook} target="_blank" className={`${isScrolled ? 'text-stone-600' : 'text-white'} hover:text-sky-400 transition-colors`}>
                                        <i data-lucide="facebook" className="w-4 h-4"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Top Content Background Wrapper */}
                    <div className="relative">
                        <div className="absolute inset-0 z-0">
                            <img src="jumbo.jpg" className="w-full h-full object-cover" alt="Background" />
                        </div>

                        {/* Hero Section */}
                        <section className="relative h-[85vh] flex items-center justify-center overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-t from-white/30 via-transparent to-black/60 z-0"></div>
                            <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                                <span className="inline-block text-sky-200 uppercase tracking-[0.6em] text-[11px] font-bold mb-8 opacity-0 animate-fade-in hero-text-shadow">
                                    OSA • SCA • Magical Realism
                                </span>
                                <h1 className="text-6xl md:text-[7.5rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up hero-text-shadow font-bold">
                                    A Realist <br/>
                                    <span className="italic font-light text-sky-100">Gone Awry.</span>
                                </h1>
                                <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in pt-8">
                                    <a href="#exhibitions" className="bg-sky-600 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-sky-700 transition-all shadow-xl">
                                        Solo Exhibition
                                    </a>
                                    <a href="#shop" className="text-white border-b-2 border-white/60 pb-1 hover:border-sky-300 transition-all tracking-[0.3em] text-[10px] uppercase font-bold hero-text-shadow">
                                        Browse Shop
                                    </a>
                                </div>
                            </div>
                        </section>

                        {/* Biography Section */}
                        <section id="biography" className="relative py-20 scroll-mt-20 px-6 md:px-12 overflow-hidden">
                            <div className="absolute inset-0 bg-white/70 backdrop-blur-[2px] z-0"></div>
                            <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-12 lg:gap-20 relative z-10">
                                <div className="w-full lg:w-5/12 flex justify-center order-2 lg:order-1">
                                    <div className="relative portrait-frame group">
                                        <div className="overflow-hidden bg-stone-100 shadow-xl max-w-[380px]">
                                            <img 
                                                src="biopic.png" 
                                                className="w-full aspect-[4/5] object-cover grayscale-[0.1] transition-all duration-700 group-hover:grayscale-0" 
                                                alt="Portrait"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full lg:w-7/12 order-1 lg:order-2">
                                    <h2 className="text-sky-600 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Artist Profile</h2>
                                    <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-none text-stone-900">Victoria <span className="italic font-light text-stone-500">Wallace</span></h3>
                                    <div className="space-y-6 text-stone-700 text-base md:text-lg leading-relaxed font-light">
                                        <p className="text-stone-900 font-medium italic text-xl border-l-4 border-sky-500 pl-6 my-8">
                                            "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                        </p>
                                        <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                        <p>Now based in <strong>Hamilton, Ontario</strong>, Victoria continues to create surrealistic narratives that embed subtle humor and hidden messages throughout her work.</p>
                                    </div>
                                    <div className="mt-12 flex flex-wrap items-center gap-10 border-t border-stone-200/50 pt-8">
                                        <div>
                                            <p className="text-[10px] uppercase tracking-widest text-stone-400 mb-1">Direct Contact</p>
                                            <p className="text-stone-900 font-bold text-sm">{PHONE_NUMBER}</p>
                                        </div>
                                        <div className="flex gap-6">
                                            <a href={SOCIAL_LINKS.instagram} target="_blank" className="text-stone-500 hover:text-sky-600 transition-colors"><i data-lucide="instagram" className="w-5 h-5"></i></a>
                                            <a href={SOCIAL_LINKS.facebook} target="_blank" className="text-stone-500 hover:text-sky-600 transition-colors"><i data-lucide="facebook" className="w-5 h-5"></i></a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Shop Section */}
                        <section id="shop" className="relative py-20 px-6 md:px-12 scroll-mt-20 overflow-hidden">
                            <div className="absolute inset-0 bg-white/60 backdrop-blur-[2px] z-0"></div>
                            <div className="max-w-7xl mx-auto relative z-10">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-8 border-b border-stone-900/10 pb-8">
                                    <div>
                                        <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                        <h3 className="text-4xl font-serif italic text-stone-900">
                                            {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                        </h3>
                                    </div>
                                    {view === 'products' && (
                                        <button onClick={() => setView('categories')} className="flex items-center gap-2 text-stone-600 hover:text-sky-700 font-bold uppercase tracking-widest text-[10px] transition-colors">
                                            <i data-lucide="arrow-left" className="w-3 h-3"></i> Back
                                        </button>
                                    )}
                                </div>

                                {view === 'categories' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl mx-auto">
                                        {categories.map((cat) => (
                                            <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="category-card group cursor-pointer flex flex-col bg-white/40 backdrop-blur-sm p-4 transition-all hover:shadow-xl border border-white/50 hover:border-sky-200">
                                                <div className="relative overflow-hidden mb-5 aspect-[4/5] bg-stone-100 shadow-md">
                                                    <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                                </div>
                                                <h4 className="text-lg font-serif mb-2 group-hover:text-sky-700 transition-colors">{cat.name}</h4>
                                                <p className="text-stone-700 text-xs font-light leading-relaxed mb-6">{cat.description}</p>
                                                <div className="mt-auto flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-sky-700">
                                                    {cat.isLink ? 'Contact' : 'Explore'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="flex flex-col bg-white/40 backdrop-blur-sm p-3 border border-white/50 hover:shadow-lg transition-all">
                                                <div className="relative overflow-hidden mb-4 aspect-square bg-stone-100 shadow-sm">
                                                    <img src={item.img} className="w-full h-full object-cover" alt={item.title} />
                                                </div>
                                                <div className="px-1 flex flex-col flex-grow">
                                                    <h4 className="text-lg font-serif mb-1">{item.title}</h4>
                                                    <div className="flex justify-between items-baseline mb-4">
                                                        <p className="text-stone-500 text-[9px] uppercase tracking-widest">{item.medium}</p>
                                                        <p className="text-stone-900 font-bold text-xs">${item.price}</p>
                                                    </div>
                                                    <a href="#" className="mt-auto block text-center w-full bg-stone-900 text-white py-3 font-bold uppercase tracking-widest text-[9px] hover:bg-sky-700 transition-colors">
                                                        Buy on Square
                                                    </a>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </section>
                    </div>

                    {/* Shared Background for Exhibition & Contact using Artwork PNG */}
                    <div className="artwork-footer-bg relative">
                        {/* Semi-transparent overlay for readability */}
                        <div className="absolute inset-0 bg-white/35 backdrop-blur-[1px] pointer-events-none"></div>

                        {/* Exhibition Section */}
                        <section id="exhibitions" className="relative py-24 md:py-32 scroll-mt-20 px-6 z-10">
                            <div className="max-w-6xl mx-auto">
                                <div className="bg-white/85 backdrop-blur-md p-8 md:p-12 shadow-2xl border-l-8 border-sky-500 max-w-4xl">
                                    <div className="flex flex-col md:flex-row items-start justify-between gap-8 mb-8">
                                        <div>
                                            <h2 className="text-sky-600 font-bold tracking-[0.4em] uppercase text-[10px] mb-3">Upcoming Solo Exhibition</h2>
                                            <h3 className="text-4xl md:text-5xl font-serif text-stone-900 leading-tight">Logic: <span className="italic font-light text-stone-500">Lost in Translation</span></h3>
                                        </div>
                                        <div className="md:text-right shrink-0">
                                            <p className="font-bold text-[11px] uppercase tracking-[0.3em] text-stone-500 mb-2">May 1 – 31, 2026</p>
                                            <p className="text-stone-900 font-bold flex items-center md:justify-end gap-2 text-lg">
                                                <i data-lucide="map-pin" className="w-5 h-5 text-sky-600"></i> Niagara Pumphouse
                                            </p>
                                        </div>
                                    </div>
                                    <p className="text-stone-700 font-light leading-relaxed text-lg mb-10 max-w-2xl">
                                        A comprehensive showcase of Victoria's latest magical realist works, exploring the boundary between the plausible and the impossible.
                                    </p>
                                    <div className="pt-8 border-t border-stone-200/50 flex flex-wrap gap-6 justify-between items-center">
                                        <p className="text-stone-600 text-sm font-medium italic">Opening Reception: Sunday, May 3 • 2–4 pm</p>
                                        <a href="#" className="bg-stone-900 text-white px-8 py-3 font-bold uppercase tracking-widest text-[10px] hover:bg-sky-600 transition-all">Learn More</a>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Contact Section */}
                        <section id="contact" className="relative py-24 scroll-mt-20 px-6 md:px-12 z-10">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row overflow-hidden shadow-2xl rounded-sm">
                                    <div className="w-full lg:w-1/2 bg-white/95 backdrop-blur-xl border-r border-stone-100 p-8 md:p-16">
                                        <h2 className="text-sky-600 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Connect</h2>
                                        <h3 className="text-5xl font-serif text-stone-900 mb-8 italic leading-tight">Let's start a <br/>conversation.</h3>
                                        <div className="space-y-8 text-stone-700 font-light text-lg">
                                            <p>For custom commissions, gallery representation, or print inquiries, please get in touch directly.</p>
                                            <div className="space-y-6 pt-8 border-t border-stone-200">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-10 h-10 rounded-full bg-sky-50 flex items-center justify-center">
                                                        <i data-lucide="mail" className="w-5 h-5 text-sky-600"></i>
                                                    </div>
                                                    <a href="mailto:Victoriawallaceartist@gmail.com" className="hover:text-sky-600 font-medium transition-colors text-base md:text-lg">Victoriawallaceartist@gmail.com</a>
                                                </div>
                                                <div className="flex items-center gap-5">
                                                    <div className="w-10 h-10 rounded-full bg-sky-50 flex items-center justify-center">
                                                        <i data-lucide="phone" className="w-5 h-5 text-sky-600"></i>
                                                    </div>
                                                    <a href={`tel:${PHONE_NUMBER.replace(/\D/g,'')}`} className="hover:text-sky-600 font-medium transition-colors text-base md:text-lg">{PHONE_NUMBER}</a>
                                                </div>
                                                <div className="flex items-center gap-5">
                                                    <div className="w-10 h-10 rounded-full bg-sky-50 flex items-center justify-center">
                                                        <i data-lucide="map-pin" className="w-5 h-5 text-sky-600"></i>
                                                    </div>
                                                    <span className="font-medium text-base md:text-lg">Hamilton, Ontario</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full lg:w-1/2 bg-stone-900/95 p-8 md:p-16">
                                        <form onSubmit={handleFormSubmit} className="space-y-4">
                                            <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Full Name</label>
                                            <input type="text" name="Name" required className="w-full bg-stone-950 border border-stone-800 p-4 text-sm text-white focus:border-sky-500 outline-none transition-all" placeholder="Your Name" />
                                            
                                            <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Email</label>
                                            <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-4 text-sm text-white focus:border-sky-500 outline-none transition-all" placeholder="Email Address" />
                                            
                                            <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Phone</label>
                                            <input type="tel" name="Phone" className="w-full bg-stone-950 border border-stone-800 p-4 text-sm text-white focus:border-sky-500 outline-none transition-all" placeholder="Optional" />
                                            
                                            <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Message</label>
                                            <textarea name="Message" rows="5" required className="w-full bg-stone-950 border border-stone-800 p-4 text-sm text-white focus:border-sky-500 outline-none transition-all" placeholder="How can I help you?"></textarea>
                                            
                                            <button type="submit" className="w-full bg-sky-600 py-5 font-bold uppercase tracking-widest text-[11px] text-white hover:bg-sky-700 transition-all shadow-xl mt-4">
                                                Open Email & Send Inquiry
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>

                    <footer className="py-12 bg-white border-t border-stone-100 text-stone-400 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <div className="flex justify-center gap-8 mb-6">
                             <a href={SOCIAL_LINKS.instagram} target="_blank" className="hover:text-sky-600 transition-colors">Instagram</a>
                             <a href={SOCIAL_LINKS.facebook} target="_blank" className="hover:text-sky-600 transition-colors">Facebook</a>
                        </div>
                        <p className="text-stone-300">© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
