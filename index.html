<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #fdfbf9;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        .portrait-frame::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid #c2410c;
            z-index: -1;
        }

        .collage-item {
            filter: brightness(0.3) contrast(1.1) grayscale(0.8);
            transition: filter 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée', squareUrl: '#' }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Limited edition archival quality reproductions available now.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for current availability.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-orange-600 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[85vh] flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" 
                                className="w-full h-full object-cover filter brightness-[0.4]" 
                                alt="Hero Background"
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/20"></div>
                        </div>
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-orange-200 uppercase tracking-[0.6em] text-[10px] font-bold mb-8 opacity-0 animate-fade-in">
                                OSA • SCA • Magical Realism
                            </span>
                            <h1 className="text-6xl md:text-[7rem] font-serif text-white mb-8 tracking-tighter leading-[0.9] opacity-0 animate-slide-up">
                                A Realist <br/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in pt-8">
                                <a href="#exhibitions" className="bg-orange-700 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-xl">
                                    Solo Exhibition
                                </a>
                                <a href="#shop" className="text-white border-b border-white/40 pb-1 hover:border-white transition-all tracking-[0.3em] text-[10px] uppercase font-bold">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Tightened Exhibition Section with Full Collage */}
                    <section id="exhibitions" className="relative py-12 md:py-16 bg-stone-950 overflow-hidden scroll-mt-20">
                        {/* Background Collage */}
                        <div className="absolute inset-0 z-0 grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8">
                            {[
                                'bluedog.webp', 'Celestial Elephant.webp', 'Mexican Standoff.webp', 
                                'Sun Dog.webp', 'huskydog.webp', 'Pasted image.png', 
                                'Pasted image (2).png', 'Pasted image (3).png', 'Pasted image (4).png',
                                'Pasted image (5).png', 'reddog.webp', 'Top Dog.webp',
                                'When Pigs Fly.webp', 'Pasted image (8).png', 'Pasted image (10).png',
                                'Pasted image (11).png', 'Pasted image (12).png', 'bluedog.webp',
                                'Pasted image (2).png', 'Sun Dog.webp', 'Pasted image (5).png', 'huskydog.webp', 'Pasted image (10).png', 'Mexican Standoff.webp'
                            ].map((img, i) => (
                                <div key={i} className="relative h-48">
                                    <img src={img} className="collage-item w-full h-full object-cover" alt="" />
                                </div>
                            ))}
                        </div>
                        
                        {/* Overlay for readability */}
                        <div className="absolute inset-0 bg-stone-950/40 backdrop-blur-[1px] z-10"></div>

                        <div className="max-w-5xl mx-auto px-6 relative z-20">
                            <div className="bg-white/95 backdrop-blur-sm p-6 md:p-8 shadow-2xl border-l-4 border-orange-700">
                                <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                                    {/* Main Content */}
                                    <div className="flex-1">
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className="h-[1px] w-6 bg-orange-700"></span>
                                            <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[9px]">Solo Exhibition</h2>
                                        </div>
                                        <h3 className="text-2xl md:text-3xl font-serif mb-2">
                                            Logic: <span className="italic font-light text-stone-500">Lost in Translation</span>
                                        </h3>
                                        <p className="text-stone-600 text-sm leading-relaxed max-w-2xl font-light">
                                            Victoria Wallace presents a new body of work exploring the boundary between precise realism and the uncanny subconscious.
                                        </p>
                                    </div>

                                    {/* Action & Info Bar - Tightened */}
                                    <div className="flex flex-col sm:flex-row lg:flex-col gap-4 sm:gap-8 lg:gap-4 lg:pl-8 lg:border-l border-stone-200">
                                        <div className="flex gap-8">
                                            <div>
                                                <p className="font-bold text-[8px] uppercase tracking-widest text-stone-400 mb-1">Dates</p>
                                                <p className="text-stone-900 text-xs font-semibold whitespace-nowrap">May 1 – 24, 2026</p>
                                            </div>
                                            <div>
                                                <p className="font-bold text-[8px] uppercase tracking-widest text-stone-400 mb-1">Location</p>
                                                <p className="text-stone-900 text-xs font-semibold whitespace-nowrap">Niagara Pumphouse</p>
                                            </div>
                                        </div>
                                        <a 
                                            href="https://niagarapumphouse.ca/exhibitions/logic-lost-in-translation-victoria-wallace-may-01-2026" 
                                            target="_blank"
                                            className="inline-flex items-center justify-center gap-2 bg-stone-900 text-white px-6 py-2.5 rounded-sm font-bold uppercase tracking-widest text-[9px] hover:bg-orange-700 transition-all shadow-md"
                                        >
                                            View Details <i data-lucide="external-link" className="w-3 h-3"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section */}
                    <section id="biography" className="py-24 bg-white scroll-mt-20 px-6 md:px-12">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-12 lg:gap-20">
                            <div className="w-full lg:w-5/12 flex justify-center order-2 lg:order-1">
                                <div className="relative portrait-frame group">
                                    <div className="overflow-hidden bg-stone-100 shadow-xl max-w-[380px]">
                                        <img 
                                            src="biopic.png" 
                                            className="w-full aspect-[4/5] object-cover grayscale-[0.2] transition-all duration-700 group-hover:grayscale-0" 
                                            alt="Victoria Wallace Portrait"
                                        />
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-7/12 order-1 lg:order-2">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Artist Profile</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-none">Victoria <span className="italic font-light text-stone-400">Wallace</span></h3>
                                <div className="space-y-6 text-stone-600 text-base md:text-lg leading-relaxed font-light">
                                    <p className="text-stone-900 font-medium italic text-xl border-l-4 border-orange-700 pl-6 my-8">
                                        "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                    </p>
                                    <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                    <p>She skillfully creates surrealistic narratives by juxtaposing realistic subject matter within fantastical scenarios, embedding subtle humor and hidden messages throughout her work.</p>
                                    <p>For more than four decades, Wallace has displayed her paintings across Toronto, Hamilton, and Europe. Her impact extends into private collections worldwide, continuing to challenge the viewer's perception of the familiar.</p>
                                </div>
                                <div className="mt-12 flex flex-wrap items-center gap-8 border-t border-stone-100 pt-8">
                                    <div className="flex items-center gap-4">
                                        <span className="text-stone-900 font-bold text-xs uppercase tracking-widest">OSA • SCA Member</span>
                                    </div>
                                    <div className="h-[1px] w-12 bg-stone-200 hidden md:block"></div>
                                    <div className="flex gap-6">
                                        <a href="https://www.instagram.com/victoriawallaceartist/" target="_blank" className="text-stone-400 hover:text-orange-700 transition-colors"><i data-lucide="instagram" className="w-5 h-5"></i></a>
                                        <a href="https://www.facebook.com/VictoriaWallaceArtist/" target="_blank" className="text-stone-400 hover:text-orange-700 transition-colors"><i data-lucide="facebook" className="w-5 h-5"></i></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Shop Section */}
                    <section id="shop" className="py-24 px-6 md:px-12 bg-stone-50 scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-8 border-b border-stone-200 pb-8">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-4xl font-serif italic">
                                        {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                    </h3>
                                </div>
                                {view === 'products' && (
                                    <button 
                                        onClick={() => setView('categories')}
                                        className="flex items-center gap-2 text-stone-400 hover:text-orange-700 font-bold uppercase tracking-widest text-[10px] transition-colors"
                                    >
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back
                                    </button>
                                )}
                            </div>

                            {view === 'categories' ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl mx-auto">
                                    {categories.map((cat) => (
                                        <div 
                                            key={cat.id} 
                                            onClick={() => handleCategoryClick(cat)}
                                            className="category-card group cursor-pointer flex flex-col bg-white p-4 transition-all hover:shadow-xl border border-transparent hover:border-stone-100"
                                        >
                                            <div className="relative overflow-hidden mb-5 aspect-[4/5] bg-stone-100">
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                            </div>
                                            <h4 className="text-lg font-serif mb-2 group-hover:text-orange-700 transition-colors">{cat.name}</h4>
                                            <p className="text-stone-500 text-xs font-light leading-relaxed mb-6">{cat.description}</p>
                                            <div className="mt-auto flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-orange-700">
                                                {cat.isLink ? 'Contact' : 'Explore'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="animate-fade-in">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="flex flex-col bg-white p-3 border border-stone-100 hover:shadow-lg transition-all">
                                                <div className="relative overflow-hidden mb-4 aspect-square bg-stone-100">
                                                    <img src={item.img} className="w-full h-full object-cover transform group-hover:scale-[1.05] transition-transform duration-700" alt={item.title} />
                                                </div>
                                                <div className="px-1 flex flex-col flex-grow">
                                                    <h4 className="text-lg font-serif mb-1">{item.title}</h4>
                                                    <div className="flex justify-between items-baseline mb-4">
                                                        <p className="text-stone-400 text-[9px] uppercase tracking-widest">{item.medium}</p>
                                                        <p className="text-stone-900 font-bold text-xs">${item.price}</p>
                                                    </div>
                                                    <a href={item.squareUrl} target="_blank" className="mt-auto block text-center w-full bg-stone-900 text-white py-3 font-bold uppercase tracking-widest text-[9px] hover:bg-orange-700 transition-colors">
                                                        Buy on Square
                                                    </a>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-24 bg-stone-950 text-white px-6 md:px-12 scroll-mt-20">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Contact</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-tight">Bring <span className="italic text-orange-200 font-light">The Uncanny</span> into your home.</h3>
                                <div className="space-y-8 mt-12">
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Direct Email</p>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-xl md:text-2xl hover:text-orange-400 transition-colors">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Inquiries</p>
                                        <p className="text-stone-400 font-light text-lg">Accepting commissions and jewelry orders for 2026.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-stone-900 p-8 md:p-12 lg:p-16 rounded-sm">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Your Email" />
                                    <textarea name="Message" rows="5" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Tell me about your interest..."></textarea>
                                    <button type="submit" className="w-full bg-orange-700 py-5 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-lg">Submit Message</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-950 border-t border-stone-900 text-stone-600 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
