<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        .animate-delay { animation-delay: 0.8s; }
        
        html { scroll-behavior: smooth; }

        .category-card:hover img {
            transform: scale(1.05);
        }

        .bio-bg-image {
            mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }
        @media (max-width: 768px) {
            .bio-bg-image {
                mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
                -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            // The 8 new prints with .webp extensions
            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_1' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_2' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_3' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_4' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_5' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_6' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_7' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK_8' }
            ];

            const categories = [
                { 
                    id: 'Originals', 
                    name: 'Original Artwork', 
                    description: 'One-of-a-kind paintings directly from Victoria\'s studio.', 
                    img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800' 
                },
                { 
                    id: 'Prints', 
                    name: 'Fine Art Prints', 
                    description: 'Select limited edition archival quality reproductions.', 
                    img: 'Celestial Elephant.webp' 
                },
                { 
                    id: 'Jewelry', 
                    name: 'Handcrafted Jewelry', 
                    description: 'Unique wearable art pieces and bespoke jewelry.', 
                    img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' 
                },
                { 
                    id: 'Commission', 
                    name: 'Custom Commissions', 
                    description: 'Collaborate on a unique vision tailored to your home.', 
                    img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', 
                    isLink: true, 
                    link: '#contact' 
                }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen bg-[#fdfbf9] text-stone-900 selection:bg-orange-200">
                    
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Biography', 'Shop', 'Workshops', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-orange-600 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[90vh] flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" 
                                className="w-full h-full object-cover filter brightness-[0.4] contrast-[1.1]" 
                                alt="Hero Background"
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/30"></div>
                        </div>
                        
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-orange-200 uppercase tracking-[0.6em] text-[10px] font-bold mb-8 opacity-0 animate-fade-in">
                                Ontario Society of Artists • Society of Canadian Artists
                            </span>
                            <h1 className="text-6xl md:text-[8rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up">
                                A Realist <br/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in animate-delay pt-8">
                                <a href="#shop" className="bg-orange-700 text-white px-12 py-5 rounded-sm font-bold uppercase tracking-widest text-xs hover:bg-orange-800 transition-all shadow-2xl flex items-center gap-3">
                                    Browse Shop <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section */}
                    <section id="biography" className="relative py-32 bg-white overflow-hidden min-h-[800px] flex items-center">
                        <div className="absolute top-0 right-0 w-full md:w-2/3 h-full z-0 pointer-events-none overflow-hidden">
                            <img 
                                src="biopic.jpg" 
                                className="w-full h-full object-cover object-top grayscale opacity-[0.2] contrast-[1.2] bio-bg-image" 
                                alt="Victoria Wallace"
                            />
                        </div>

                        <div className="max-w-7xl mx-auto px-6 md:px-12 relative z-10">
                            <div className="max-w-2xl">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-6">Artist Profile</h2>
                                <h3 className="text-6xl md:text-8xl font-serif mb-10 leading-none">Victoria <br/><span className="italic font-light text-stone-400">Wallace</span></h3>
                                
                                <div className="space-y-8 text-stone-600 text-lg md:text-xl leading-relaxed font-light">
                                    <p className="text-stone-900 font-medium italic">"I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."</p>
                                    <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                    <p>In her artwork, she skillfully creates surrealistic narratives by juxtaposing realistic subject matter within fantastical scenarios. She derives immense joy from the subtle humor and hidden messages covertly embedded in her artworks.</p>
                                    <p>For more than four decades, Wallace has displayed her paintings across Toronto, Hamilton, and Europe. Her impact extends into private collections worldwide, continuing to challenge the viewer's perception of the familiar.</p>
                                </div>

                                <div className="mt-12 flex items-center gap-8">
                                    <div className="h-[1px] w-24 bg-orange-700"></div>
                                    <div className="flex gap-6">
                                        <a href="https://www.instagram.com/victoriawallaceartist/" target="_blank" className="text-stone-400 hover:text-orange-700 transition-colors"><i data-lucide="instagram"></i></a>
                                        <a href="https://www.facebook.com/VictoriaWallaceArtist/" target="_blank" className="text-stone-400 hover:text-orange-700 transition-colors"><i data-lucide="facebook"></i></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Shop Section */}
                    <section id="shop" className="py-32 px-6 md:px-12 bg-[#f9f7f5] scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-stone-200 pb-12">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-5xl font-serif leading-none italic">
                                        {view === 'categories' ? 'Curated Collections' : activeCategory}
                                    </h3>
                                </div>
                                {view === 'products' && (
                                    <button 
                                        onClick={() => setView('categories')}
                                        className="flex items-center gap-2 text-stone-400 hover:text-orange-700 font-bold uppercase tracking-widest text-[10px] transition-colors"
                                    >
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                    </button>
                                )}
                            </div>

                            {view === 'categories' ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {categories.map((cat) => (
                                        <div 
                                            key={cat.id} 
                                            onClick={() => handleCategoryClick(cat)}
                                            className="category-card group cursor-pointer flex flex-col h-full bg-white border border-stone-100 p-4 transition-all hover:shadow-2xl"
                                        >
                                            <div className="relative overflow-hidden mb-6 aspect-[4/5] bg-stone-200">
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700" />
                                                <div className="absolute inset-0 bg-stone-900/10 group-hover:bg-transparent transition-colors"></div>
                                            </div>
                                            <h4 className="text-xl font-serif mb-2 group-hover:text-orange-700 transition-colors">{cat.name}</h4>
                                            <p className="text-stone-500 text-sm font-light leading-relaxed mb-6 flex-grow">{cat.description}</p>
                                            <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-orange-700 transition-colors">
                                                {cat.isLink ? 'Commission Work' : 'Explore Gallery'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 animate-fade-in">
                                    {filteredProducts.map((item) => (
                                        <div key={item.id} className="group flex flex-col h-full bg-white p-4 shadow-sm border border-stone-100">
                                            <div className="relative overflow-hidden mb-6 rounded-sm bg-stone-100 aspect-square">
                                                <img src={item.img} alt={item.title} className="w-full h-full object-cover transform group-hover:scale-[1.05] transition-transform duration-700" />
                                            </div>
                                            <h4 className="text-xl font-serif mb-2">{item.title}</h4>
                                            <div className="flex justify-between items-baseline mb-2">
                                                <p className="text-stone-400 text-[10px] uppercase tracking-widest">{item.medium}</p>
                                                <p className="text-stone-900 font-bold text-sm">${item.price}</p>
                                            </div>
                                            <a 
                                                href={item.squareUrl} 
                                                target="_blank" 
                                                className="block text-center w-full bg-stone-900 text-white py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-700 transition-colors mt-auto"
                                            >
                                                Buy Now
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Workshops Section */}
                    <section id="workshops" className="relative py-32 flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.25]" alt="Art Studio" />
                        </div>
                        <div className="relative z-10 max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-xs mb-6">Education & Mentorship</h2>
                            <h3 className="text-5xl md:text-6xl font-serif text-white leading-tight mb-8">Learn the <span className="italic text-orange-200">Alchemy</span></h3>
                            <p className="text-stone-300 text-lg md:text-xl font-light leading-relaxed mb-10 max-w-2xl mx-auto">
                                Victoria offers professional instruction and private mentorship in specialized mediums, including Encaustic and Acrylics. Sessions are available via Zoom or in-person at her Hamilton studio.
                            </p>
                            <a href="#contact" className="inline-flex items-center gap-3 bg-orange-700 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-600 transition-colors shadow-2xl">
                                Inquire about Workshops <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </a>
                        </div>
                    </section>

                    {/* Credentials Section */}
                    <section id="credentials" className="py-32 px-6 md:px-12 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="max-w-3xl">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-xs mb-8">Curriculum Vitae</h2>
                                <h3 className="text-4xl font-serif mb-12 italic leading-tight">A legacy of artistic exploration and education spanning over four decades.</h3>
                                <div className="space-y-12">
                                    {[
                                        { title: "Professional Affiliations", items: ["Ontario Society of Artists (OSA) - Elected Member", "Society of Canadian Artists (SCA) - Elected Member"] },
                                        { title: "Instruction", items: ["Fleming College, Haliburton School of Art + Design", "Golden Artist Educator", "R&F Certified Encaustic Instructor"] },
                                        { title: "Education", items: ["Architectural Drafting, Humber College", "Fine Art, George Brown College"] }
                                    ].map((group, i) => (
                                        <div key={i}>
                                            <h4 className="text-stone-900 font-bold uppercase tracking-widest text-[10px] mb-4 border-b border-stone-100 pb-2">{group.title}</h4>
                                            <ul className="space-y-2 text-stone-600 font-light">
                                                {group.items.map((item, j) => <li key={j}>{item}</li>)}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-32 bg-stone-950 text-white px-6 md:px-12">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20">
                            <div className="w-full lg:w-1/2">
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Get In Touch</h2>
                                <h3 className="text-5xl md:text-7xl font-serif mb-10 leading-tight">Bring <span className="italic text-orange-200 font-light">The Uncanny</span> into your space.</h3>
                                
                                <div className="space-y-10 mt-16">
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Email Inquiry</p>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-xl md:text-2xl hover:text-orange-400 transition-colors border-b border-stone-800 pb-2 block w-fit">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Phone</p>
                                        <a href="tel:+17055595509" className="text-xl md:text-2xl hover:text-orange-400 transition-colors border-b border-stone-800 pb-2 block w-fit">(705) 559-5509</a>
                                    </div>
                                    <div className="flex gap-8 pt-4">
                                        <a href="https://www.instagram.com/victoriawallaceartist/" target="_blank" className="hover:text-orange-500 transition-colors"><i data-lucide="instagram"></i></a>
                                        <a href="https://www.facebook.com/VictoriaWallaceArtist/" target="_blank" className="hover:text-orange-500 transition-colors"><i data-lucide="facebook"></i></a>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-1/2 bg-stone-900 p-10 md:p-16">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500" placeholder="Email Address" />
                                    <textarea name="Message" rows="5" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500" placeholder="Your Message"></textarea>
                                    <button type="submit" className="w-full bg-orange-700 py-5 font-bold uppercase tracking-widest text-[10px]">Send Message</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-16 bg-stone-950 text-stone-600 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
