<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=Inter:wght=300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #ffffff; /* Bright base */
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        /* Realistic Gallery Frame Style */
        .art-frame {
            position: relative;
            display: inline-block;
            background: #ffffff; /* White matting */
            padding: 16px; /* Mat width */
            box-shadow: 
                0 0 0 10px #1c1917, /* Dark charcoal/black wooden frame */
                0 25px 30px -5px rgba(0,0,0,0.3); /* Softer drop shadow for light mode */
            transition: all 0.4s ease;
        }
        .group:hover .art-frame {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 0 0 10px #1c1917, 
                0 35px 40px -10px rgba(0,0,0,0.4);
        }

        /* Fixed Backgrounds using Fluffy Clouds */
        .bg-jumbo, .bg-footer-art {
            background-image: url('https://images.unsplash.com/photo-1501630834273-4b5604d2ee31?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Whitewash effect: Consistent white overlay so the page feels white but images show through */
        .overlay-whitewash { 
            background-color: rgba(255, 255, 255, 0.75); 
        }

        /* Form styling for light mode */
        .contact-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 0;
            transition: all 0.4s ease;
            color: #1c1917; /* Dark text */
        }
        .contact-input:focus {
            border-bottom-color: #0284c7;
            background: rgba(0, 0, 0, 0.02);
            outline: none;
        }
        .contact-input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        /* Custom Font for Header */
        @font-face {
            font-family: 'Hendershot';
            src: url('Hendershot-DOMKR.ttf') format('truetype');
        }
        .font-hendershot {
            font-family: 'Hendershot', cursive, serif;
        }

        /* Zoom Lens effect */
        .zoom-container {
            position: relative;
            overflow: hidden;
            cursor: zoom-in;
        }
        .zoom-image {
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        .zoom-container:hover .zoom-image {
            transform: scale(2.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const randomizeCase = (str) => {
            return str.split('').map(char => Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase()).join('');
        };

        const STATIC_ARTISTIC_EYE = randomizeCase("The Artistic Eye.ca");
        const STATIC_VICTORIA_WALLACE = randomizeCase("Victoria Wallace");

        // Defined available sizes and calculations
        const SIZES_CONFIG = [
            { label: '12"x12"', price: 300, linkPlaceholder: '#' },
            { label: '16"x16"', price: 400, linkPlaceholder: '#' },
            { label: '24"x24"', price: 500, linkPlaceholder: '#' },
            { label: '30"x30"', price: 600, linkPlaceholder: '#' },
            { label: '48"x48"', price: 700, linkPlaceholder: '#' }
        ];

        const PRODUCTS_DATA = [
            { 
                id: 'p1', 
                title: 'Walking The Plank', 
                category: 'Prints', 
                img: 'bluedog.webp', 
                medium: 'Archival Giclée', 
                description: "Discover \"Walking the plank,\" a delightfully surreal painting that perfectly balances regal confidence with playful whimsy. This captivating piece features a charming tan Chihuahua commanding center stage while pulling off an extraordinary balancing act.\n\nAdorned in a vibrant, cobalt-blue top hat with a classic black band, this fearless little pup stands entirely unfazed atop a wooden trapeze bar suspended high in the air. The contrast between the dog's small stature and bold demeanor gives the piece an undeniable personality that will bring warmth, wit, and conversation to any space."
            },
            { 
                id: 'p2', 
                title: 'Celestial Elephant', 
                category: 'Prints', 
                img: 'Celestial Elephant.webp', 
                medium: 'Archival Giclée', 
                description: "Step into a world of grand scale and impossible balance with \"Celestial Elephant.\" This breathtaking, surreal painting features a majestic elephant performing a gravity-defying feat with ultimate grace, commanding a thin high-wire high above the world.\n\nDraped in a brilliant red ceremonial blanket adorned with vibrant white, blue, and gold stars, this splendid creature expertly balances atop a single unicycle wheel. The sheer contrast between the elephant's massive, powerful presence and the delicate precision of the tightrope act creates an enchanting visual story that captivates anyone who looks at it."
            },
            { 
                id: 'p3', 
                title: 'German Engineering', 
                category: 'Prints', 
                img: 'huskydog.webp', 
                medium: 'Archival Giclée', 
                description: "Open the doors to pure imagination with \"German engineering.\" This uniquely captivating painting brings a clever, theatrical twist to a classic canine portrait, capturing a moment of intense focus and incredible skill right on the threshold of the great blue sky.\n\nPeering out from a pair of grand, open French doors, a handsome and alert German Shepherd type pup balances with athletic precision on a unicycle. Suspended over a light-washed wooden deck that seems to look out onto the edge of the world, this fearless dog looks onward into the horizon, ready for whatever comes next."
            },
            { 
                id: 'p4', 
                title: 'Mexican Standoff', 
                category: 'Prints', 
                img: 'Mexican Standoff.webp', 
                medium: 'Archival Giclée', 
                description: "Bring a bold look and a touch of aristocratic humor into your space with \"Mexican Standoff.\" This unforgettable surrealist portrait features a tiny, defiant Chihuahua holding down the fort with maximum attitude and regal composure.\n\nPerched securely atop a rugged, sun-baked cliffside overlooking a vast sea, this little pup stares directly into the viewer's eyes. The crowning glory is a spectacular, vibrant top hat featuring bold vertical stripes of primary blue, yellow, and red. It’s a hilarious, endearing testament to the massive personality packed inside a small dog."
            },
            { 
                id: 'p5', 
                title: 'Valour Over The Void', 
                category: 'Prints', 
                img: 'reddog.webp', 
                medium: 'Archival Giclée', 
                description: "Embrace the thrill of the high wire with \"valour over the void,\" a whimsical, adventurous painting that celebrates bravery, caution, and style. This charming piece features a clever little Chihuahua carefully navigating a tightrope walk high above the sparkling sea.\n\nDressed for the occasion in a vibrant, dapper crimson top hat with a black band, this focused pup leaves nothing to chance—securely fastened into a matching red safety harness connected to an overhead wire. Walking with careful intent, this little explorer proves that you can be adventurous while still staying perfectly safe."
            },
            { 
                id: 'p6', 
                title: 'Sun Dog', 
                category: 'Prints', 
                img: 'Sun Dog.webp', 
                medium: 'Archival Giclée', 
                description: "Bask in the bright, joyful energy of \"Sun Dog.\" This delightfully surreal painting features a crisp white terrier-type pup executing a flawless high-wire act with absolute serenity and poise.\n\nSporting a tall, vibrant red conical hat that adds a brilliant festive pop to the composition, this charming little acrobat walks a suspended tightrope without a care in the world. The striking contrast between the dog's snow-white fur, the bold red hat, and the deep blue ocean makes this an instantly captivating piece of art."
            },
            { 
                id: 'p7', 
                title: 'Top Dog', 
                category: 'Prints', 
                img: 'Top Dog.webp', 
                medium: 'Archival Giclée', 
                description: "Experience a masterclass in dreamlike precision with \"Top Dog.\" This stunning, minimalist surrealist painting depicts a sleek hound-type dog gracefully navigating a high wire stretched across a vast, quiet horizon.\n\nSecured by a delicate overhead harness, this focused pup carries an extraordinary balancing apparatus: a large, whimsical spinning-top structure painted in festive rainbow stripes of red, yellow, green, and blue, crowned with a fluffy yellow pom-pom. The painting beautifully captures a sense of quiet concentration and cinematic style."
            },
            { 
                id: 'p8', 
                title: 'When Pigs Fly', 
                category: 'Prints', 
                img: 'When Pigs Fly.webp', 
                medium: 'Archival Giclée', 
                description: "Turn the impossible into a beautiful reality with \"When Pigs Fly.\" This magnificent surrealist painting brings the classic idiom to life with ultimate grace, showcasing a charming pink pig soaring effortlessly through the clouds.\n\nEquipped with a pair of grand, sweeping feathered wings, this joyful creature glides high above the world with a gentle, contented smile. It is a triumphant, uplifting celebration of imagination, freedom, and breaking through limitations."
            }
        ];

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedSize, setSelectedSize] = useState(SIZES_CONFIG[0]); // Default is 12"x12"
            const [zoomPos, setZoomPos] = useState({ x: 50, y: 50 });

            const SOCIAL_LINKS = {
                facebook: "https://www.facebook.com/victoriawallaceartist",
                instagram: "https://www.instagram.com/victoriawallace.artist"
            };

            const PHONE_NUMBER = "(705) 559-5509";

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory, selectedProduct, selectedSize]);

            const handleProductSelect = (product) => {
                setSelectedProduct(product);
                setSelectedSize(SIZES_CONFIG[0]); // Reset to first option when opening modal
            };

            const handleFormSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('Name');
                const email = formData.get('Email');
                const message = formData.get('Message');
                const subject = encodeURIComponent(`Inquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
                window.location.href = `mailto:Victoriawallaceartist@gmail.com?subject=${subject}&body=${body}`;
            };

            const products = PRODUCTS_DATA;

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Giclée reproduction prints of Victoria\'s original works, available in multiple sizes starting from $300.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for availability.', img: 'jewel.jpg' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision for your home.', img: 'vicpaint.jpg', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const handleMouseMove = (e) => {
                const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
                const x = ((e.pageX - left - window.scrollX) / width) * 100;
                const y = ((e.pageY - top - window.scrollY) / height) * 100;
                setZoomPos({ x, y });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-lg py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className="flex flex-col text-stone-900 group">
                                <span className="text-4xl md:text-5xl lg:text-6xl font-hendershot text-sky-700 leading-none group-hover:text-sky-600 transition-colors tracking-wide">
                                    {STATIC_ARTISTIC_EYE}
                                </span>
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-[10px] uppercase tracking-[0.3em] font-bold text-stone-600 hover:text-sky-600 transition-colors">
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-jumbo">
                        <div className="absolute inset-0 overlay-whitewash z-0"></div>
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto flex flex-col items-center">
                            <span className="inline-block text-sky-700 uppercase tracking-[0.6em] text-[11px] font-bold mb-6 opacity-0 animate-fade-in">
                                OSA • SCA • Magical Realism
                            </span>
                            <h2 className="text-5xl md:text-7xl font-hendershot text-stone-800 mb-2 opacity-0 animate-slide-up" style={{ animationDelay: '0.1s' }}>
                                {STATIC_VICTORIA_WALLACE}
                            </h2>
                            <h1 className="text-6xl md:text-[7.5rem] font-serif text-stone-900 mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up font-bold" style={{ animationDelay: '0.3s' }}>
                                A Realist <br/>
                                <span className="italic font-light text-sky-700">Gone Awry.</span>
                            </h1>
                            <div className="flex gap-8 justify-center items-center opacity-0 animate-fade-in pt-4" style={{ animationDelay: '0.6s' }}>
                                <a href="#shop" className="bg-sky-600 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-sky-700 transition-all shadow-xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* BIOGRAPHY */}
                    <section id="biography" className="relative bg-jumbo">
                        <div className="overlay-whitewash py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
                                    <div className="w-full lg:w-5/12 flex justify-center">
                                        <div className="group">
                                            <div className="art-frame">
                                                <div className="overflow-hidden bg-stone-100 max-w-[340px]">
                                                    <img src="biopic.png" className="w-full aspect-[4/5] object-cover transition-transform duration-700 group-hover:scale-105" alt="Portrait" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-7/12">
                                        <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Artist Profile</h2>
                                        <h3 className="text-5xl font-serif mb-8 text-stone-900">Victoria <span className="italic font-light text-stone-500">Wallace</span></h3>
                                        <div className="space-y-6 text-stone-700 text-lg leading-relaxed font-light">
                                            <p className="font-serif italic text-2xl border-l-4 border-sky-500 pl-6 my-8 text-stone-800">
                                                "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                            </p>
                                            <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                            <p>Currently based in Peterborough, Ontario, she is an elected member of both the Ontario Society of Artists and the Society of Canadian Artists.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SHOP */}
                    <section id="shop" className="relative bg-jumbo">
                        <div className="overlay-whitewash py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-stone-200 pb-8">
                                    <div>
                                        <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                        <h3 className="text-4xl font-serif italic text-stone-900">
                                            {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                        </h3>
                                    </div>
                                    {view === 'products' && (
                                        <button onClick={() => setView('categories')} className="flex items-center gap-2 text-stone-600 hover:text-sky-600 font-bold uppercase tracking-widest text-[10px] transition-colors">
                                            <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                        </button>
                                    )}
                                </div>

                                {view === 'categories' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 max-w-5xl mx-auto">
                                        {categories.map((cat) => (
                                            <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="group cursor-pointer">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-[4/5] bg-stone-100 w-64 md:w-80">
                                                            <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-xl font-serif mb-2 text-stone-900">{cat.name}</h4>
                                                    <p className="text-stone-600 text-xs font-light mb-4 px-4">{cat.description}</p>
                                                    <div className="flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-widest text-sky-700">
                                                        Explore <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-16 animate-fade-in">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="group">
                                                <div className="flex justify-center mb-10 cursor-zoom-in" onClick={() => handleProductSelect(item)}>
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-square bg-stone-100 w-48">
                                                            <img src={item.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={item.title} />
                                                        </div>
                                                        <div className="absolute inset-0 bg-white/0 group-hover:bg-white/30 transition-colors flex items-center justify-center">
                                                            <i data-lucide="maximize-2" className="text-stone-900 opacity-0 group-hover:opacity-100 transition-opacity w-6 h-6 drop-shadow-md"></i>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-4xl md:text-5xl font-hendershot mb-2 text-stone-900 capitalize">{item.title}</h4>
                                                    <p className="text-stone-500 text-[9px] uppercase tracking-widest mb-3">{item.medium}</p>
                                                    <p className="text-sky-700 font-bold text-xs mb-4">From $300</p>
                                                    <button onClick={() => handleProductSelect(item)} className="text-stone-800 hover:text-sky-600 font-bold uppercase tracking-widest text-[9px] border-b border-stone-300 hover:border-sky-600 transition-all pb-1">
                                                        View & Purchase
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* PRODUCT MODAL WITH ZOOM */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-white/95 backdrop-blur-xl p-4 md:p-12 animate-fade-in overflow-y-auto">
                            <button 
                                onClick={() => setSelectedProduct(null)} 
                                className="absolute top-8 right-8 text-stone-500 hover:text-stone-900 z-[110]"
                            >
                                <i data-lucide="x" className="w-8 h-8"></i>
                            </button>
                            
                            <div className="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center my-auto">
                                {/* Zoomable Image Section */}
                                <div className="flex justify-center">
                                    <div 
                                        className="art-frame zoom-container overflow-hidden max-h-[70vh]"
                                        onMouseMove={handleMouseMove}
                                    >
                                        <img 
                                            src={selectedProduct.img} 
                                            alt={selectedProduct.title}
                                            className="zoom-image object-contain max-h-[70vh]"
                                            style={{ 
                                                transformOrigin: `${zoomPos.x}% ${zoomPos.y}%`
                                            }}
                                        />
                                        <div className="absolute top-4 right-4 bg-white/80 text-stone-900 p-2 rounded-full pointer-events-none backdrop-blur-sm shadow-sm">
                                            <i data-lucide="search" className="w-4 h-4"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Product Info Section */}
                                <div className="text-stone-900 space-y-8">
                                    <div>
                                        <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Print Detail</h2>
                                        <h3 className="text-5xl md:text-7xl font-hendershot mb-2 text-stone-800 leading-tight capitalize">{selectedProduct.title}</h3>
                                        <p className="text-stone-500 text-xl font-light uppercase tracking-widest mt-2">{selectedProduct.medium}</p>
                                    </div>
                                    
                                    <div className="space-y-6 text-stone-700 font-light leading-relaxed">
                                        <div className="space-y-4 text-lg text-stone-700 leading-relaxed">
                                            {selectedProduct.description.split('\n\n').map((paragraph, index) => (
                                                <p key={index}>{paragraph}</p>
                                            ))}
                                        </div>

                                        {/* Amazon-style Oval Size Selector Buttons */}
                                        <div className="space-y-3 pt-4 border-t border-stone-200">
                                            <span className="text-xs uppercase font-bold tracking-wider text-stone-500">Select Print Dimensions:</span>
                                            <div className="flex flex-wrap gap-2 pt-1">
                                                {SIZES_CONFIG.map((sizeOpt) => (
                                                    <button
                                                        key={sizeOpt.label}
                                                        onClick={() => setSelectedSize(sizeOpt)}
                                                        className={`px-6 py-2 rounded-full border text-sm font-semibold tracking-wide transition-all ${
                                                            selectedSize.label === sizeOpt.label
                                                                ? 'border-sky-600 bg-sky-50 text-sky-800 shadow-sm ring-2 ring-sky-600/20'
                                                                : 'border-stone-300 hover:border-stone-500 text-stone-700 hover:bg-stone-50'
                                                        }`}
                                                    >
                                                        {sizeOpt.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <ul className="text-sm space-y-2 border-t border-stone-200 pt-4 text-stone-600">
                                            <li className="flex items-center gap-2"><i data-lucide="check" className="w-4 h-4 text-sky-600"></i> Museum Quality Fine Art Reproduction</li>
                                            <li className="flex items-center gap-2"><i data-lucide="check" className="w-4 h-4 text-sky-600"></i> Archival Pigment Inks</li>
                                            <li className="flex items-center gap-2"><i data-lucide="maximize" className="w-4 h-4 text-sky-600"></i> Custom configured dimensions: {selectedSize.label}</li>
                                            <li className="flex items-center gap-2"><i data-lucide="truck" className="w-4 h-4 text-sky-600"></i> Studio Pickup & Domestic Shipping Options</li>
                                        </ul>
                                    </div>

                                    <div className="flex flex-col sm:flex-row sm:items-end gap-6 pt-6 border-t border-stone-200">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] uppercase tracking-wider text-stone-500">Price Structure ({selectedSize.label})</span>
                                            <span className="text-4xl font-serif text-stone-900">${selectedSize.price} <span className="text-xs uppercase tracking-widest text-stone-400 font-sans ml-2">CAD</span></span>
                                        </div>
                                        <a 
                                            href={selectedSize.linkPlaceholder} 
                                            onClick={(e) => {
                                                if(selectedSize.linkPlaceholder === '#') {
                                                    e.preventDefault();
                                                    alert("Dynamic Square connection working! Update with your size-specific checkout URL once live.");
                                                }
                                            }}
                                            className="bg-sky-600 hover:bg-sky-700 text-white px-12 py-5 rounded-sm font-bold uppercase tracking-widest text-xs transition-all shadow-xl flex items-center justify-center gap-3"
                                        >
                                            Secure Checkout <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                                        </a>
                                    </div>
                                    <p className="text-[10px] text-stone-500 italic">Expected processing & shipping: 7–10 business days.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXHIBITIONS */}
                    <section id="exhibitions" className="relative bg-footer-art">
                        <div className="overlay-whitewash py-32 px-6">
                            <div className="max-w-5xl mx-auto text-center">
                                <div className="flex items-center justify-center gap-4 mb-6">
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-600/30"></span>
                                    <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px]">Solo Exhibition</h2>
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-600/30"></span>
                                </div>
                                
                                <h3 className="text-5xl md:text-7xl font-serif text-stone-900 leading-tight mb-8">
                                    Logic: <span className="italic font-light text-sky-700">Lost in Translation</span>
                                </h3>
                                
                                <div className="flex flex-wrap justify-center gap-4 md:gap-8 mb-10">
                                    <div className="flex items-center gap-2 px-5 py-2 border border-stone-300 rounded-full backdrop-blur-sm bg-white/50">
                                        <i data-lucide="calendar" className="w-4 h-4 text-sky-600"></i>
                                        <span className="text-stone-700 font-bold text-[10px] uppercase tracking-widest">May 1 – 31, 2026</span>
                                    </div>
                                    <div className="flex items-center gap-2 px-5 py-2 border border-stone-300 rounded-full backdrop-blur-sm bg-white/50">
                                        <i data-lucide="map-pin" className="w-4 h-4 text-sky-600"></i>
                                        <span className="text-stone-700 font-bold text-[10px] uppercase tracking-widest">Niagara Pumphouse</span>
                                    </div>
                                </div>
                                
                                <p className="text-stone-700 font-light leading-relaxed text-lg md:text-xl max-w-3xl mx-auto mb-12">
                                    A comprehensive showcase of Victoria's latest magical realist works, exploring the boundary between the plausible and the impossible.
                                </p>
                                
                                <div className="flex flex-col items-center gap-6">
                                    <p className="text-sky-800 text-sm md:text-lg font-serif italic">Opening Reception: Sunday, May 3 • 2–4 pm</p>
                                    <a href="#contact" className="text-sky-800 border border-sky-600 px-8 py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-sky-600 hover:text-white transition-all">
                                        Inquire for Private View
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT */}
                    <section id="contact" className="relative bg-footer-art">
                        <div className="overlay-whitewash py-32 px-6">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row gap-20 items-center">
                                    <div className="w-full lg:w-1/2">
                                        <div className="flex items-center gap-4 mb-4">
                                            <i data-lucide="palette" className="w-6 h-6 text-sky-600"></i>
                                            <h2 className="text-sky-700 font-bold tracking-[0.4em] uppercase text-[10px]">Connect</h2>
                                        </div>
                                        <h3 className="text-5xl md:text-6xl font-serif text-stone-900 mb-8 leading-tight">
                                            Start a <br/><span className="italic text-sky-700">masterpiece.</span>
                                        </h3>
                                        <div className="space-y-8 text-stone-700 font-light text-lg">
                                            <p className="max-w-md">Whether you are interested in custom commissions, gallery representation, or print inquiries, I would love to hear from you.</p>
                                            <div className="space-y-6 pt-8 border-t border-stone-200">
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="mail" className="w-5 h-5 text-sky-600 group-hover:scale-110 transition-transform"></i>
                                                    <a href="mailto:Victoriawallaceartist@gmail.com" className="hover:text-sky-600 font-bold transition-colors text-base md:text-lg tracking-wide">Victoriawallaceartist@gmail.com</a>
                                                </div>
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="phone" className="w-5 h-5 text-sky-600 group-hover:scale-110 transition-transform"></i>
                                                    <span className="font-bold text-base md:text-lg tracking-wide">{PHONE_NUMBER}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full lg:w-1/2">
                                        <form onSubmit={handleFormSubmit} className="space-y-8 bg-white/60 p-8 md:p-12 rounded-sm border border-stone-200 backdrop-blur-md shadow-xl relative">
                                            {/* Decorative artistic corners */}
                                            <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-sky-600/50 rounded-tl-sm"></div>
                                            <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-sky-600/50 rounded-tr-sm"></div>
                                            <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-sky-600/50 rounded-bl-sm"></div>
                                            <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-sky-600/50 rounded-br-sm"></div>

                                            <div className="relative flex items-end">
                                                <i data-lucide="user" className="w-4 h-4 text-sky-600 absolute bottom-3 left-0"></i>
                                                <input type="text" name="Name" required className="w-full contact-input py-2 pl-8" placeholder="Your Name" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="at-sign" className="w-4 h-4 text-sky-600 absolute bottom-3 left-0"></i>
                                                <input type="email" name="Email" required className="w-full contact-input py-2 pl-8" placeholder="your@email.com" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="phone" className="w-4 h-4 text-sky-600 absolute bottom-3 left-0"></i>
                                                <input type="tel" name="Phone" className="w-full contact-input py-2 pl-8" placeholder="Phone (Optional)" />
                                            </div>
                                            <div className="relative flex items-start pt-2">
                                                <i data-lucide="message-square" className="w-4 h-4 text-sky-600 absolute top-4 left-0"></i>
                                                <textarea name="Message" rows="3" required className="w-full contact-input py-2 pl-8 resize-none" placeholder="What's on your mind?"></textarea>
                                            </div>
                                            <button type="submit" className="group w-full flex items-center justify-center gap-3 border border-sky-600 text-sky-800 py-4 font-bold uppercase tracking-widest text-[11px] hover:bg-sky-600 hover:text-white transition-all shadow-md mt-4 backdrop-blur-sm">
                                                <span>Send Inquiry</span>
                                                <i data-lucide="send" className="w-4 h-4 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-100 text-stone-500 text-[10px] tracking-[0.3em] uppercase font-bold text-center border-t border-stone-200">
                        <div className="flex justify-center gap-8 mb-4">
                             <a href={SOCIAL_LINKS.instagram} target="_blank" className="hover:text-sky-600 transition-colors">Instagram</a>
                             <a href={SOCIAL_LINKS.facebook} target="_blank" className="hover:text-sky-600 transition-colors">Facebook</a>
                        </div>
                        <p className="text-stone-400">© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
