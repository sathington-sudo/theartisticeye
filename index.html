<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #fdfbf9;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        .animate-float { animation: float 8s ease-in-out infinite; }
        
        html { scroll-behavior: smooth; }

        /* Exhibition Collage Styling */
        .collage-wrapper {
            position: relative;
            height: 650px;
            width: 100%;
        }
        .collage-img {
            position: absolute;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 10px solid white;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            object-fit: cover;
            cursor: pointer;
        }
        .collage-img:hover {
            transform: scale(1.08) rotate(0deg) !important;
            z-index: 50 !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .category-card:hover img {
            transform: scale(1.05);
        }

        .portrait-frame::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid #c2410c;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée', squareUrl: '#' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée', squareUrl: '#' }
            ];

            const previewOriginals = [
                { id: 'o1', title: 'The Artistic Eye', img: 'Pasted image.png' },
                { id: 'o2', title: 'Midnight Muse', img: 'Pasted image (2).png' },
                { id: 'o3', title: 'Surrealist Dreams', img: 'Pasted image (3).png' },
                { id: 'o4', title: 'Silent Narrative', img: 'Pasted image (4).png' },
                { id: 'o5', title: 'The Observer', img: 'Pasted image (5).png' },
                { id: 'o6', title: 'The Last Gaze', img: 'Pasted image (12).png' }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Limited edition archival quality reproductions available now.', img: 'Celestial Elephant.webp' },
                { id: 'Originals', name: 'Original Gallery', description: 'Explore Victoria\'s current portfolio. Originals coming to the store soon.', img: 'Pasted image (12).png', isPreview: true },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for current availability.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-orange-600 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[85vh] flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" 
                                className="w-full h-full object-cover filter brightness-[0.4]" 
                                alt="Hero Background"
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/20"></div>
                        </div>
                        
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-orange-200 uppercase tracking-[0.6em] text-[10px] font-bold mb-8 opacity-0 animate-fade-in">
                                OSA • SCA • Magical Realism
                            </span>
                            <h1 className="text-6xl md:text-[7rem] font-serif text-white mb-8 tracking-tighter leading-[0.9] opacity-0 animate-slide-up">
                                A Realist <br/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in pt-8">
                                <a href="#exhibitions" className="bg-orange-700 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-xl">
                                    Current Exhibition
                                </a>
                                <a href="#shop" className="text-white border-b border-white/40 pb-1 hover:border-white transition-all tracking-[0.3em] text-[10px] uppercase font-bold">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Exhibition Collage Section */}
                    <section id="exhibitions" className="py-24 md:py-32 bg-stone-50 overflow-hidden scroll-mt-20">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24 items-center">
                                {/* Text Content - Ensures visibility */}
                                <div className="z-10 relative bg-stone-50/80 backdrop-blur-sm lg:bg-transparent p-6 lg:p-0 rounded-lg">
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Juried Showcase</h2>
                                    <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-tight italic">The 151st Open Exhibition</h3>
                                    <p className="text-stone-600 font-light leading-relaxed mb-10 text-lg max-w-xl">
                                        Join Victoria at the Ontario Society of Artists' flagship event. Her latest work explores the delicate boundaries between observation and imagination.
                                    </p>
                                    
                                    <div className="bg-white p-8 shadow-sm border border-stone-100 space-y-6 mb-10">
                                        <div className="flex items-start gap-4">
                                            <i data-lucide="calendar" className="w-5 h-5 text-orange-700"></i>
                                            <div>
                                                <p className="font-bold text-[10px] uppercase tracking-widest text-stone-400">Exhibition Dates</p>
                                                <p className="text-stone-900 font-medium">March 27 - April 11, 2024</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4">
                                            <i data-lucide="map-pin" className="w-5 h-5 text-orange-700"></i>
                                            <div>
                                                <p className="font-bold text-[10px] uppercase tracking-widest text-stone-400">Venue</p>
                                                <p className="text-stone-900 font-medium">Queen's Park, Toronto, ON</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="inline-flex items-center gap-4 bg-orange-700 text-white p-4 pr-8 shadow-xl">
                                        <div className="w-12 h-12 overflow-hidden border border-white/20">
                                            <img src="Mexican Standoff.webp" className="w-full h-full object-cover" alt="Mexican Standoff" />
                                        </div>
                                        <div>
                                            <p className="text-[9px] uppercase tracking-widest font-bold opacity-70">Featured Work</p>
                                            <p className="font-serif italic text-lg">Mexican Standoff</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Dynamic Collage - Large Screens Only */}
                                <div className="hidden lg:block collage-wrapper">
                                    <img 
                                        src="Mexican Standoff.webp" 
                                        className="collage-img w-[300px] h-[400px] z-40 animate-float" 
                                        style={{ top: '5%', left: '15%' }} 
                                        alt="Exhibition Piece" 
                                    />
                                    <img 
                                        src="Pasted image (12).png" 
                                        className="collage-img w-[240px] h-[320px] z-30" 
                                        style={{ top: '45%', right: '5%', transform: 'rotate(4deg)' }} 
                                        alt="Portfolio Piece" 
                                    />
                                    <img 
                                        src="Sun Dog.webp" 
                                        className="collage-img w-[200px] h-[200px] z-20" 
                                        style={{ bottom: '5%', left: '0', transform: 'rotate(-8deg)' }} 
                                        alt="Portfolio Piece" 
                                    />
                                    <img 
                                        src="Pasted image (3).png" 
                                        className="collage-img w-[220px] h-[280px] z-10 opacity-60" 
                                        style={{ top: '0', right: '15%', transform: 'rotate(-5deg)' }} 
                                        alt="Study" 
                                    />
                                </div>

                                {/* Mobile Fallback Image */}
                                <div className="lg:hidden mt-8">
                                    <img src="Mexican Standoff.webp" className="w-full shadow-2xl border-4 border-white" alt="Mexican Standoff" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Shop / Gallery Section */}
                    <section id="shop" className="py-24 px-6 md:px-12 bg-white scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-8 border-b border-stone-100 pb-8">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-4xl font-serif italic">
                                        {view === 'categories' ? 'Collections & Gallery' : activeCategory === 'Originals' ? 'Original Portfolio' : activeCategory}
                                    </h3>
                                </div>
                                {view === 'products' && (
                                    <button 
                                        onClick={() => setView('categories')}
                                        className="flex items-center gap-2 text-stone-400 hover:text-orange-700 font-bold uppercase tracking-widest text-[10px] transition-colors"
                                    >
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back
                                    </button>
                                )}
                            </div>

                            {view === 'categories' ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {categories.map((cat) => (
                                        <div 
                                            key={cat.id} 
                                            onClick={() => handleCategoryClick(cat)}
                                            className="category-card group cursor-pointer flex flex-col bg-stone-50 p-4 transition-all hover:bg-white hover:shadow-xl border border-transparent hover:border-stone-100"
                                        >
                                            <div className="relative overflow-hidden mb-5 aspect-[4/5] bg-stone-200">
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700" />
                                                {cat.isPreview && (
                                                    <div className="absolute inset-0 bg-stone-900/40 flex items-center justify-center">
                                                        <span className="text-white text-[9px] uppercase tracking-[0.3em] font-bold border border-white/40 px-3 py-1">Preview</span>
                                                    </div>
                                                )}
                                            </div>
                                            <h4 className="text-lg font-serif mb-2 group-hover:text-orange-700 transition-colors">{cat.name}</h4>
                                            <p className="text-stone-500 text-xs font-light leading-relaxed mb-6">{cat.description}</p>
                                            <div className="mt-auto flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-orange-700">
                                                {cat.isLink ? 'Contact' : cat.isPreview ? 'View Gallery' : 'Shop Prints'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="animate-fade-in">
                                    {activeCategory === 'Originals' ? (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                            {previewOriginals.map((item) => (
                                                <div key={item.id} className="group">
                                                    <div className="overflow-hidden bg-stone-100 mb-4 aspect-[3/4]">
                                                        <img src={item.img} className="w-full h-full object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all duration-700" alt={item.title} />
                                                    </div>
                                                    <h4 className="font-serif text-xl">{item.title}</h4>
                                                    <p className="text-stone-400 text-[10px] uppercase tracking-widest mt-1">Status: Studio Collection (Inquire for availability)</p>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {products.filter(p => p.category === activeCategory).map((item) => (
                                                <div key={item.id} className="flex flex-col bg-white p-3 border border-stone-100 hover:shadow-lg transition-all">
                                                    <div className="relative overflow-hidden mb-4 aspect-square bg-stone-100">
                                                        <img src={item.img} className="w-full h-full object-cover" alt={item.title} />
                                                    </div>
                                                    <h4 className="text-lg font-serif mb-1">{item.title}</h4>
                                                    <div className="flex justify-between items-baseline mb-4">
                                                        <p className="text-stone-400 text-[9px] uppercase tracking-widest">{item.medium}</p>
                                                        <p className="text-stone-900 font-bold text-xs">${item.price}</p>
                                                    </div>
                                                    <a href={item.squareUrl} target="_blank" className="block text-center w-full bg-stone-900 text-white py-3 font-bold uppercase tracking-widest text-[9px] hover:bg-orange-700 transition-colors">
                                                        Buy on Square
                                                    </a>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-24 md:py-32 bg-stone-950 text-white px-6 md:px-12 scroll-mt-20">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Contact</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-tight">Bring <span className="italic text-orange-200 font-light">The Uncanny</span> into your home.</h3>
                                <div className="space-y-8 mt-12">
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Direct Email</p>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-xl md:text-2xl hover:text-orange-400 transition-colors">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                    <div>
                                        <p className="text-orange-500 font-bold uppercase tracking-widest text-[10px] mb-2">Inquiries</p>
                                        <p className="text-stone-400 font-light text-lg">Accepting commissions and jewelry orders for 2024.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-stone-900 p-8 md:p-12 lg:p-16 rounded-sm">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Your Email" />
                                    <textarea name="Message" rows="5" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500 transition-colors" placeholder="Tell me about your interest..."></textarea>
                                    <button type="submit" className="w-full bg-orange-700 py-5 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-lg">Submit Message</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-950 border-t border-stone-900 text-stone-600 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
