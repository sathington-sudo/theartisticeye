<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=Inter:wght=300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #0c0a09; /* Warmer deep dark base to pair with the orange-amber overlays */
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        /* Realistic Gallery Frame Style */
        .art-frame {
            position: relative;
            display: inline-block;
            background: #fdfbf9; /* White matting */
            padding: 16px; /* Mat width */
            box-shadow: 
                0 0 0 10px #1c1917, /* Dark charcoal/black wooden frame */
                0 25px 30px -5px rgba(0,0,0,0.6); /* Heavy drop shadow */
            transition: all 0.4s ease;
        }
        .group:hover .art-frame {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 0 0 10px #1c1917, 
                0 35px 40px -10px rgba(0,0,0,0.8);
        }

        /* Enhanced text shadow for readability on light backgrounds */
        .hero-text-shadow {
            text-shadow: 1px 2px 4px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.6);
        }

        /* Fixed Backgrounds */
        .bg-jumbo {
            background-image: url('jumbo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .bg-footer-art {
            background-image: url('Pasted image (16).png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Gradual Dark Orange-to-Light Warm Copper Transitions (Fading lighter as you scroll down) */
        .overlay-header { background-color: rgba(30, 15, 4, 0.94); }     /* Deep rich burnt umber */
        .overlay-bio { background-color: rgba(45, 20, 5, 0.82); }        /* Highly opaque warm clay orange */
        .overlay-shop { background-color: rgba(58, 26, 6, 0.65); }       /* Translucent glowing amber */
        .overlay-exhibition { background-color: rgba(68, 30, 6, 0.42); } /* Ethereal subtle orange wash */
        .overlay-contact { background-color: rgba(78, 34, 6, 0.20); }    /* Gentle transparent warm glow */

        .contact-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 0;
            transition: all 0.4s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .contact-input:focus {
            border-bottom-color: #38bdf8;
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        .contact-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            text-shadow: none;
        }

        /* Zoom Lens effect */
        .zoom-container {
            position: relative;
            overflow: hidden;
            cursor: zoom-in;
        }
        .zoom-image {
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }
        .zoom-container:hover .zoom-image {
            transform: scale(2.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [zoomPos, setZoomPos] = useState({ x: 50, y: 50 });

            const SOCIAL_LINKS = {
                facebook: "https://www.facebook.com/victoriawallaceartist",
                instagram: "https://www.instagram.com/victoriawallace.artist"
            };

            const PHONE_NUMBER = "(705) 559-5509";

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory, selectedProduct]);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('Name');
                const email = formData.get('Email');
                const message = formData.get('Message');
                const subject = encodeURIComponent(`Inquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
                window.location.href = `mailto:Victoriawallaceartist@gmail.com?subject=${subject}&body=${body}`;
            };

            const products = [
                { 
                    id: 'p1', 
                    title: 'Blue Dog', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'bluedog.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/gBdWfTYs',
                    description: "Discover \"Blue Dog,\" a delightfully surreal painting that perfectly balances regal confidence with playful whimsy. This captivating piece features a charming tan Chihuahua commanding center stage while pulling off an extraordinary balancing act.\n\nAdorned in a vibrant, cobalt-blue top hat with a classic black band, this fearless little pup stands entirely unfazed atop a wooden trapeze bar suspended high in the air. The contrast between the dog's small stature and bold demeanor gives the piece an undeniable personality that will bring warmth, wit, and conversation to any space."
                },
                { 
                    id: 'p2', 
                    title: 'Celestial Elephant', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'Celestial Elephant.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/yXb9L0aG',
                    description: "Step into a world of grand scale and impossible balance with \"Celestial Elephant.\" This breathtaking, surreal painting features a majestic elephant performing a gravity-defying feat with ultimate grace, commanding a thin high-wire high above the world.\n\nDraped in a brilliant red ceremonial blanket adorned with vibrant white, blue, and gold stars, this splendid creature expertly balances atop a single unicycle wheel. The sheer contrast between the elephant's massive, powerful presence and the delicate precision of the tightrope act creates an enchanting visual story that captivates anyone who looks at it."
                },
                { 
                    id: 'p3', 
                    title: 'Husky Dog', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'huskydog.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/cgul6lZ8',
                    description: "Open the doors to pure imagination with \"Husky Dog.\" This uniquely captivating painting brings a clever, theatrical twist to a classic canine portrait, capturing a moment of intense focus and incredible skill right on the threshold of the great blue sky.\n\nPeering out from a pair of grand, open French doors, a handsome and alert German Shepherd type pup balances with athletic precision on a unicycle. Suspended over a light-washed wooden deck that seems to look out onto the edge of the world, this fearless dog looks onward into the horizon, ready for whatever comes next."
                },
                { 
                    id: 'p4', 
                    title: 'Mexican Standoff', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'Mexican Standoff.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/pPlj8eEg',
                    description: "Bring a bold look and a touch of aristocratic humor into your space with \"Mexican Standoff.\" This unforgettable surrealist portrait features a tiny, defiant Chihuahua holding down the fort with maximum attitude and regal composure.\n\nPerched securely atop a rugged, sun-baked cliffside overlooking a vast sea, this little pup stares directly into the viewer's eyes. The crowning glory is a spectacular, vibrant top hat featuring bold vertical stripes of primary blue, yellow, and red. It’s a hilarious, endearing testament to the massive personality packed inside a small dog."
                },
                { 
                    id: 'p5', 
                    title: 'Red Dog', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'reddog.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/LJwTd48c',
                    description: "Embrace the thrill of the high wire with \"Red Dog,\" a whimsical, adventurous painting that celebrates bravery, caution, and style. This charming piece features a clever little Chihuahua carefully navigating a tightrope walk high above the sparkling sea.\n\nDressed for the occasion in a vibrant, dapper crimson top hat with a black band, this focused pup leaves nothing to chance—securely fastened into a matching red safety harness connected to an overhead wire. Walking with careful intent, this little explorer proves that you can be adventurous while still staying perfectly safe."
                },
                { 
                    id: 'p6', 
                    title: 'Sun Dog', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'Sun Dog.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/IFvWjeKv',
                    description: "Bask in the bright, joyful energy of \"Sun Dog.\" This delightfully surreal painting features a crisp white terrier-type pup executing a flawless high-wire act with absolute serenity and poise.\n\nSporting a tall, vibrant red conical hat that adds a brilliant festive pop to the composition, this charming little acrobat walks a suspended tightrope without a care in the world. The striking contrast between the dog's snow-white fur, the bold red hat, and the deep blue ocean makes this an instantly captivating piece of art."
                },
                { 
                    id: 'p7', 
                    title: 'Top Dog', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'Top Dog.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/8H8mCiyG',
                    description: "Experience a masterclass in dreamlike precision with \"Top Dog.\" This stunning, minimalist surrealist painting depicts a sleek hound-type dog gracefully navigating a high wire stretched across a vast, quiet horizon.\n\nSecured by a delicate overhead harness, this focused pup carries an extraordinary balancing apparatus: a large, whimsical spinning-top structure painted in festive rainbow stripes of red, yellow, green, and blue, crowned with a fluffy yellow pom-pom. The painting beautifully captures a sense of quiet concentration and cinematic style."
                },
                { 
                    id: 'p8', 
                    title: 'When Pigs Fly', 
                    category: 'Prints', 
                    price: 300, 
                    img: 'When Pigs Fly.webp', 
                    medium: 'Archival Giclée', 
                    link: 'https://square.link/u/JeRSEzzI',
                    description: "Turn the impossible into a beautiful reality with \"When Pigs Fly.\" This magnificent surrealist painting brings the classic idiom to life with ultimate grace, showcasing a charming pink pig soaring effortlessly through the clouds.\n\nEquipped with a pair of grand, sweeping feathered wings, this joyful creature glides high above the world with a gentle, contented smile. It is a triumphant, uplifting celebration of imagination, freedom, and breaking through limitations."
                }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Giclée reproduction prints of Victoria\'s original works, available in multiple sizes starting from $300.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for availability.', img: 'jewel.jpg' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision for your home.', img: 'vicpaint.jpg', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const handleMouseMove = (e) => {
                const { left, top, width, height } = e.currentTarget.getBoundingClientRect();
                const x = ((e.pageX - left - window.scrollX) / width) * 100;
                const y = ((e.pageY - top - window.scrollY) / height) * 100;
                setZoomPos({ x, y });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-stone-950/95 backdrop-blur-md shadow-lg py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className="text-xl md:text-2xl font-bold tracking-[0.25em] text-white">
                                VICTORIA WALLACE
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-[10px] uppercase tracking-[0.3em] font-bold text-white hover:text-sky-400 transition-colors">
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-jumbo">
                        <div className="absolute inset-0 overlay-header z-0"></div>
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-sky-300 uppercase tracking-[0.6em] text-[11px] font-bold mb-8 opacity-0 animate-fade-in hero-text-shadow">
                                OSA • SCA • Magical Realism
                            </span>
                            <h1 className="text-6xl md:text-[7.5rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up hero-text-shadow font-bold">
                                A Realist <br/>
                                <span className="italic font-light text-sky-100">Gone Awry.</span>
                            </h1>
                            <div className="flex gap-8 justify-center items-center opacity-0 animate-fade-in pt-8">
                                <a href="#shop" className="bg-sky-600 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-sky-700 transition-all shadow-xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* BIOGRAPHY */}
                    <section id="biography" className="relative bg-jumbo">
                        <div className="overlay-bio py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
                                    <div className="w-full lg:w-5/12 flex justify-center">
                                        <div className="group">
                                            <div className="art-frame">
                                                <div className="overflow-hidden bg-stone-900 max-w-[340px]">
                                                    <img src="biopic.png" className="w-full aspect-[4/5] object-cover transition-transform duration-700 group-hover:scale-105" alt="Portrait" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-7/12">
                                        <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] mb-4 hero-text-shadow">Artist Profile</h2>
                                        <h3 className="text-5xl font-serif mb-8 text-white hero-text-shadow">Victoria <span className="italic font-light text-stone-200">Wallace</span></h3>
                                        <div className="space-y-6 text-stone-100 text-lg leading-relaxed font-light hero-text-shadow">
                                            <p className="font-serif italic text-2xl border-l-4 border-sky-500 pl-6 my-8 text-white">
                                                "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                            </p>
                                            <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                            <p>Currently based in Peterborough, Ontario, she is an elected member of both the Ontario Society of Artists and the Society of Canadian Artists.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SHOP */}
                    <section id="shop" className="relative bg-jumbo">
                        <div className="overlay-shop py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-white/20 pb-8">
                                    <div>
                                        <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] mb-4 hero-text-shadow">Official Store</h2>
                                        <h3 className="text-4xl font-serif italic text-white hero-text-shadow">
                                            {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                        </h3>
                                    </div>
                                    {view === 'products' && (
                                        <button onClick={() => setView('categories')} className="flex items-center gap-2 text-white hover:text-sky-400 font-bold uppercase tracking-widest text-[10px] transition-colors hero-text-shadow">
                                            <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                        </button>
                                    )}
                                </div>

                                {view === 'categories' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 max-w-5xl mx-auto">
                                        {categories.map((cat) => (
                                            <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="group cursor-pointer">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-[4/5] bg-stone-900 w-64 md:w-80">
                                                            <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-xl font-serif mb-2 text-white hero-text-shadow">{cat.name}</h4>
                                                    <p className="text-stone-200 text-xs font-light mb-4 px-4 hero-text-shadow">{cat.description}</p>
                                                    <div className="flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-widest text-sky-400 hero-text-shadow">
                                                        Explore <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-16 animate-fade-in">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="group">
                                                <div className="flex justify-center mb-10 cursor-zoom-in" onClick={() => setSelectedProduct(item)}>
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-square bg-stone-900 w-48">
                                                            <img src={item.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={item.title} />
                                                        </div>
                                                        <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-center justify-center">
                                                            <i data-lucide="maximize-2" className="text-white opacity-0 group-hover:opacity-100 transition-opacity w-6 h-6"></i>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-lg font-serif mb-1 text-white hero-text-shadow">{item.title}</h4>
                                                    <p className="text-stone-300 text-[9px] uppercase tracking-widest mb-3 hero-text-shadow">{item.medium}</p>
                                                    <p className="text-sky-300 font-bold text-xs mb-4 hero-text-shadow">From ${item.price}</p>
                                                    <button onClick={() => setSelectedProduct(item)} className="text-white hover:text-sky-400 font-bold uppercase tracking-widest text-[9px] border-b border-white/20 hover:border-sky-400 transition-all pb-1 hero-text-shadow">
                                                        View & Purchase
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* PRODUCT MODAL WITH ZOOM */}
                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-xl p-4 md:p-12 animate-fade-in">
                            <button 
                                onClick={() => setSelectedProduct(null)} 
                                className="absolute top-8 right-8 text-white/50 hover:text-white z-[110]"
                            >
                                <i data-lucide="x" className="w-8 h-8"></i>
                            </button>
                            
                            <div className="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                {/* Zoomable Image Section */}
                                <div className="flex justify-center">
                                    <div 
                                        className="art-frame zoom-container overflow-hidden max-h-[70vh]"
                                        onMouseMove={handleMouseMove}
                                    >
                                        <img 
                                            src={selectedProduct.img} 
                                            alt={selectedProduct.title}
                                            className="zoom-image object-contain max-h-[70vh]"
                                            style={{ 
                                                transformOrigin: `${zoomPos.x}% ${zoomPos.y}%`
                                            }}
                                        />
                                        <div className="absolute top-4 right-4 bg-black/40 text-white p-2 rounded-full pointer-events-none backdrop-blur-sm">
                                            <i data-lucide="search" className="w-4 h-4"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Product Info Section */}
                                <div className="text-white space-y-8">
                                    <div>
                                        <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Print Detail</h2>
                                        <h3 className="text-5xl md:text-6xl font-serif italic mb-2">{selectedProduct.title}</h3>
                                        <p className="text-stone-400 text-xl font-light uppercase tracking-widest">{selectedProduct.medium}</p>
                                    </div>
                                    
                                    <div className="space-y-6 text-stone-300 font-light leading-relaxed">
                                        <div className="space-y-4 text-lg text-stone-200 leading-relaxed">
                                            {selectedProduct.description.split('\n\n').map((paragraph, index) => (
                                                <p key={index}>{paragraph}</p>
                                            ))}
                                        </div>
                                        <ul className="text-sm space-y-2 border-t border-white/15 pt-4">
                                            <li className="flex items-center gap-2"><i data-lucide="check" className="w-4 h-4 text-sky-500"></i> Museum Quality Fine Art Reproduction</li>
                                            <li className="flex items-center gap-2"><i data-lucide="check" className="w-4 h-4 text-sky-500"></i> Archival Pigment Inks</li>
                                            <li className="flex items-center gap-2"><i data-lucide="maximize" className="w-4 h-4 text-sky-500"></i> Sizes Available: 12"x12", 16"x16", 24"x24", 30"x30", 48"x48"</li>
                                            <li className="flex items-center gap-2"><i data-lucide="sliders" className="w-4 h-4 text-sky-500"></i> Select your preferred size on our Square checkout page</li>
                                            <li className="flex items-center gap-2"><i data-lucide="truck" className="w-4 h-4 text-sky-500"></i> Studio Pickup & Domestic Shipping Options</li>
                                        </ul>
                                    </div>

                                    <div className="flex flex-col sm:flex-row sm:items-end gap-6 pt-6 border-t border-white/10">
                                        <div className="flex flex-col">
                                            <span className="text-[10px] uppercase tracking-wider text-stone-400">Price Structure</span>
                                            <span className="text-4xl font-serif">From ${selectedProduct.price} <span className="text-xs uppercase tracking-widest text-stone-500 font-sans ml-2">CAD</span></span>
                                        </div>
                                        <a 
                                            href={selectedProduct.link} 
                                            target="_blank"
                                            className="bg-sky-600 hover:bg-sky-700 text-white px-12 py-5 rounded-sm font-bold uppercase tracking-widest text-xs transition-all shadow-2xl flex items-center justify-center gap-3"
                                        >
                                            Secure Checkout <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                                        </a>
                                    </div>
                                    <p className="text-[10px] text-stone-500 italic">Select your preferred format on Square. Expected shipping: 7–10 business days.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXHIBITIONS */}
                    <section id="exhibitions" className="relative bg-footer-art">
                        <div className="overlay-exhibition py-32 px-6">
                            <div className="max-w-5xl mx-auto text-center">
                                <div className="flex items-center justify-center gap-4 mb-6">
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-400/50"></span>
                                    <h2 className="text-sky-300 font-bold tracking-[0.4em] uppercase text-[10px] hero-text-shadow">Solo Exhibition</h2>
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-400/50"></span>
                                </div>
                                
                                <h3 className="text-5xl md:text-7xl font-serif text-white leading-tight mb-8 hero-text-shadow">
                                    Logic: <span className="italic font-light text-sky-200">Lost in Translation</span>
                                </h3>
                                
                                <div className="flex flex-wrap justify-center gap-4 md:gap-8 mb-10">
                                    <div className="flex items-center gap-2 px-5 py-2 border border-white/30 rounded-full backdrop-blur-sm hero-text-shadow">
                                        <i data-lucide="calendar" className="w-4 h-4 text-sky-300"></i>
                                        <span className="text-white font-bold text-[10px] uppercase tracking-widest">May 1 – 31, 2026</span>
                                    </div>
                                    <div className="flex items-center gap-2 px-5 py-2 border border-white/30 rounded-full backdrop-blur-sm hero-text-shadow">
                                        <i data-lucide="map-pin" className="w-4 h-4 text-sky-300"></i>
                                        <span className="text-white font-bold text-[10px] uppercase tracking-widest">Niagara Pumphouse</span>
                                    </div>
                                </div>
                                
                                <p className="text-stone-100 font-light leading-relaxed text-lg md:text-xl max-w-3xl mx-auto mb-12 hero-text-shadow">
                                    A comprehensive showcase of Victoria's latest magical realist works, exploring the boundary between the plausible and the impossible.
                                </p>
                                
                                <div className="flex flex-col items-center gap-6">
                                    <p className="text-sky-200 text-sm md:text-lg font-serif italic hero-text-shadow">Opening Reception: Sunday, May 3 • 2–4 pm</p>
                                    <a href="#contact" className="text-white border border-sky-400/50 px-8 py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-sky-400/20 hover:border-sky-300 transition-all backdrop-blur-sm hero-text-shadow">
                                        Inquire for Private View
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT */}
                    <section id="contact" className="relative bg-footer-art">
                        <div className="overlay-contact py-32 px-6">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row gap-20 items-center">
                                    <div className="w-full lg:w-1/2">
                                        <div className="flex items-center gap-4 mb-4">
                                            <i data-lucide="palette" className="w-6 h-6 text-sky-400"></i>
                                            <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] hero-text-shadow">Connect</h2>
                                        </div>
                                        <h3 className="text-5xl md:text-6xl font-serif text-white mb-8 leading-tight hero-text-shadow">
                                            Start a <br/><span className="italic text-sky-200">masterpiece.</span>
                                        </h3>
                                        <div className="space-y-8 text-stone-100 font-light text-lg">
                                            <p className="hero-text-shadow max-w-md">Whether you are interested in custom commissions, gallery representation, or print inquiries, I would love to hear from you.</p>
                                            <div className="space-y-6 pt-8 border-t border-white/20">
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="mail" className="w-5 h-5 text-sky-300 group-hover:scale-110 transition-transform"></i>
                                                    <a href="mailto:Victoriawallaceartist@gmail.com" className="hover:text-sky-300 font-bold transition-colors hero-text-shadow text-base md:text-lg tracking-wide">Victoriawallaceartist@gmail.com</a>
                                                </div>
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="phone" className="w-5 h-5 text-sky-300 group-hover:scale-110 transition-transform"></i>
                                                    <span className="font-bold hero-text-shadow text-base md:text-lg tracking-wide">{PHONE_NUMBER}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full lg:w-1/2">
                                        <form onSubmit={handleFormSubmit} className="space-y-8 bg-black/20 p-8 md:p-12 rounded-sm border border-white/10 backdrop-blur-md shadow-2xl relative">
                                            {/* Decorative artistic corners */}
                                            <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-sky-400/50 rounded-tl-sm"></div>
                                            <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-sky-400/50 rounded-tr-sm"></div>
                                            <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-sky-400/50 rounded-bl-sm"></div>
                                            <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-sky-400/50 rounded-br-sm"></div>

                                            <div className="relative flex items-end">
                                                <i data-lucide="user" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="text" name="Name" required className="w-full contact-input py-2 pl-8" placeholder="Your Name" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="at-sign" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="email" name="Email" required className="w-full contact-input py-2 pl-8" placeholder="your@email.com" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="phone" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="tel" name="Phone" className="w-full contact-input py-2 pl-8" placeholder="Phone (Optional)" />
                                            </div>
                                            <div className="relative flex items-start pt-2">
                                                <i data-lucide="message-square" className="w-4 h-4 text-sky-300 absolute top-4 left-0"></i>
                                                <textarea name="Message" rows="3" required className="w-full contact-input py-2 pl-8 resize-none" placeholder="What's on your mind?"></textarea>
                                            </div>
                                            <button type="submit" className="group w-full flex items-center justify-center gap-3 border border-sky-400/50 text-white py-4 font-bold uppercase tracking-widest text-[11px] hover:bg-sky-400/20 hover:border-sky-300 transition-all shadow-xl mt-4 backdrop-blur-sm">
                                                <span>Send Inquiry</span>
                                                <i data-lucide="send" className="w-4 h-4 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-950 text-stone-500 text-[10px] tracking-[0.3em] uppercase font-bold text-center border-t border-white/5">
                        <div className="flex justify-center gap-8 mb-4">
                             <a href={SOCIAL_LINKS.instagram} target="_blank" className="hover:text-sky-400 transition-colors">Instagram</a>
                             <a href={SOCIAL_LINKS.facebook} target="_blank" className="hover:text-sky-400 transition-colors">Facebook</a>
                        </div>
                        <p className="text-stone-600">© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
