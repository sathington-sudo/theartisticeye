<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #fdfbf9;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        /* Unified Frame Style for all images */
        .art-frame {
            position: relative;
            display: inline-block;
        }
        .art-frame::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: -12px;
            bottom: -12px;
            border: 1px solid rgba(125, 211, 252, 0.6); /* Sky blue accent frame */
            z-index: -1;
            transition: all 0.5s ease;
        }
        .group:hover .art-frame::before {
            top: 8px;
            left: 8px;
            right: -8px;
            bottom: -8px;
            border-color: rgba(125, 211, 252, 1);
        }

        .hero-text-shadow {
            text-shadow: 2px 4px 12px rgba(0,0,0,0.4);
        }

        /* Fixed Backgrounds */
        .bg-jumbo {
            background-image: url('jumbo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .bg-footer-art {
            background-image: url('Pasted image (16).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Progressively Lighter Overlays */
        .overlay-1 { background-color: rgba(255, 255, 255, 0.4); } /* Darkest/Most transparent */
        .overlay-2 { background-color: rgba(255, 255, 255, 0.6); } 
        .overlay-3 { background-color: rgba(255, 255, 255, 0.8); } 
        .overlay-4 { background-color: rgba(255, 255, 255, 0.92); } /* Lightest/Most opaque */

        /* Input styling */
        .contact-input {
            background: transparent;
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease;
        }
        .contact-input:focus {
            border-bottom-color: #0369a1;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            const SOCIAL_LINKS = {
                facebook: "https://www.facebook.com/victoriawallaceartist",
                instagram: "https://www.instagram.com/victoriawallace.artist"
            };

            const PHONE_NUMBER = "(705) 559-5509";

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('Name');
                const email = formData.get('Email');
                const message = formData.get('Message');
                const subject = encodeURIComponent(`Inquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
                window.location.href = `mailto:Victoriawallaceartist@gmail.com?subject=${subject}&body=${body}`;
            };

            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée' }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Limited edition archival quality reproductions.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for availability.', img: 'Pasted image (14).jpg' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision for your home.', img: 'Pasted image (15).jpg', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-sky-500 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* HERO (Full Background) */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-jumbo">
                        <div className="absolute inset-0 bg-black/40 z-0"></div>
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-sky-200 uppercase tracking-[0.6em] text-[11px] font-bold mb-8 opacity-0 animate-fade-in hero-text-shadow">
                                OSA • SCA • Magical Realism
                            </span>
                            <h1 className="text-6xl md:text-[7.5rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up hero-text-shadow font-bold">
                                A Realist <br/>
                                <span className="italic font-light text-sky-100">Gone Awry.</span>
                            </h1>
                            <div className="flex gap-8 justify-center items-center opacity-0 animate-fade-in pt-8">
                                <a href="#shop" className="bg-sky-600 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-sky-700 transition-all shadow-xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* BIOGRAPHY (Overlay Level 1 - Darker/Rich) */}
                    <section id="biography" className="relative bg-jumbo">
                        <div className="overlay-1 py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
                                    <div className="w-full lg:w-5/12 flex justify-center">
                                        <div className="art-frame group">
                                            <div className="overflow-hidden bg-stone-100 shadow-xl max-w-[340px]">
                                                <img src="biopic.png" className="w-full aspect-[4/5] object-cover transition-transform duration-700 group-hover:scale-105" alt="Portrait" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-7/12">
                                        <h2 className="text-sky-900 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Artist Profile</h2>
                                        <h3 className="text-5xl font-serif mb-8 text-stone-900">Victoria <span className="italic font-light text-stone-700">Wallace</span></h3>
                                        <div className="space-y-6 text-stone-900 text-lg leading-relaxed font-normal">
                                            <p className="font-serif italic text-2xl border-l-4 border-sky-600 pl-6 my-8">
                                                "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                            </p>
                                            <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                            <p>Currently based in Peterborough, Ontario, she is an elected member of both the Ontario Society of Artists and the Society of Canadian Artists.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SHOP (Overlay Level 2 - Lighter) */}
                    <section id="shop" className="relative bg-jumbo">
                        <div className="overlay-2 py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-stone-900/10 pb-8">
                                    <div>
                                        <h2 className="text-sky-900 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                        <h3 className="text-4xl font-serif italic text-stone-900">
                                            {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                        </h3>
                                    </div>
                                    {view === 'products' && (
                                        <button onClick={() => setView('categories')} className="flex items-center gap-2 text-stone-800 hover:text-sky-700 font-bold uppercase tracking-widest text-[10px] transition-colors">
                                            <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                        </button>
                                    )}
                                </div>

                                {view === 'categories' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 max-w-5xl mx-auto">
                                        {categories.map((cat) => (
                                            <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="group cursor-pointer">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-[4/5] bg-stone-100 shadow-md w-64 md:w-80">
                                                            <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-xl font-serif mb-2">{cat.name}</h4>
                                                    <p className="text-stone-800 text-xs font-medium mb-4 px-4">{cat.description}</p>
                                                    <div className="flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-widest text-sky-800">
                                                        Explore <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-16 animate-fade-in">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="group">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-square bg-stone-100 shadow-sm w-48">
                                                            <img src={item.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={item.title} />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-lg font-serif mb-1">{item.title}</h4>
                                                    <p className="text-stone-700 text-[9px] uppercase tracking-widest mb-3">{item.medium}</p>
                                                    <p className="text-stone-900 font-bold text-xs mb-4">${item.price}</p>
                                                    <button className="text-sky-700 hover:text-sky-900 font-bold uppercase tracking-widest text-[9px] border-b border-sky-200 hover:border-sky-700 transition-all pb-1">
                                                        Purchase Piece
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* EXHIBITIONS (Overlay Level 3 - Bright) */}
                    <section id="exhibitions" className="relative bg-footer-art">
                        <div className="overlay-3 py-32 px-6">
                            <div className="max-w-6xl mx-auto">
                                <div className="max-w-4xl border-l-4 border-sky-600 pl-8 md:pl-16">
                                    <div className="flex flex-col md:flex-row items-start justify-between gap-8 mb-8">
                                        <div>
                                            <h2 className="text-sky-900 font-bold tracking-[0.4em] uppercase text-[10px] mb-3">Solo Exhibition</h2>
                                            <h3 className="text-4xl md:text-5xl font-serif text-stone-900 leading-tight">Logic: <span className="italic font-light text-stone-700">Lost in Translation</span></h3>
                                        </div>
                                        <div className="shrink-0 md:text-right">
                                            <p className="font-bold text-[11px] uppercase tracking-[0.3em] text-stone-700 mb-2">May 1 – 31, 2026</p>
                                            <p className="text-stone-900 font-bold flex items-center md:justify-end gap-2 text-lg">
                                                <i data-lucide="map-pin" className="w-5 h-5 text-sky-700"></i> Niagara Pumphouse
                                            </p>
                                        </div>
                                    </div>
                                    <p className="text-stone-900 font-normal leading-relaxed text-lg mb-10 max-w-2xl">
                                        A comprehensive showcase of Victoria's latest magical realist works, exploring the boundary between the plausible and the impossible.
                                    </p>
                                    <div className="pt-8 border-t border-stone-900/10 flex flex-wrap gap-6 justify-between items-center">
                                        <p className="text-stone-800 text-sm font-bold italic">Opening Reception: Sunday, May 3 • 2–4 pm</p>
                                        <a href="#contact" className="text-stone-900 border-b-2 border-stone-900 pb-1 font-bold uppercase tracking-widest text-[10px] hover:text-sky-700 hover:border-sky-700 transition-all">Inquire for Private View</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT (Overlay Level 4 - Cleanest/Whitest) */}
                    <section id="contact" className="relative bg-footer-art">
                        <div className="overlay-4 py-32 px-6">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row gap-20">
                                    <div className="w-full lg:w-1/2">
                                        <h2 className="text-sky-900 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Connect</h2>
                                        <h3 className="text-5xl font-serif text-stone-900 mb-8 italic leading-tight">Start a <br/>conversation.</h3>
                                        <div className="space-y-8 text-stone-900 font-normal text-lg">
                                            <p>For custom commissions, gallery representation, or print inquiries, please get in touch.</p>
                                            <div className="space-y-6 pt-8 border-t border-stone-900/10">
                                                <div className="flex items-center gap-5">
                                                    <i data-lucide="mail" className="w-5 h-5 text-sky-700"></i>
                                                    <a href="mailto:Victoriawallaceartist@gmail.com" className="hover:text-sky-700 font-bold transition-colors">Victoriawallaceartist@gmail.com</a>
                                                </div>
                                                <div className="flex items-center gap-5">
                                                    <i data-lucide="phone" className="w-5 h-5 text-sky-700"></i>
                                                    <span className="font-bold">{PHONE_NUMBER}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full lg:w-1/2">
                                        <form onSubmit={handleFormSubmit} className="space-y-10">
                                            <div className="relative">
                                                <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Name</label>
                                                <input type="text" name="Name" required className="w-full contact-input py-3 text-stone-900 font-medium" placeholder="Your Full Name" />
                                            </div>
                                            <div className="relative">
                                                <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Email</label>
                                                <input type="email" name="Email" required className="w-full contact-input py-3 text-stone-900 font-medium" placeholder="your@email.com" />
                                            </div>
                                            <div className="relative">
                                                <label className="text-[10px] uppercase tracking-widest text-stone-500 font-bold block mb-1">Message</label>
                                                <textarea name="Message" rows="4" required className="w-full contact-input py-3 text-stone-900 resize-none font-medium" placeholder="How can I help you?"></textarea>
                                            </div>
                                            <button type="submit" className="bg-stone-900 text-white px-12 py-4 font-bold uppercase tracking-widest text-[11px] hover:bg-sky-800 transition-all shadow-xl">
                                                Send Inquiry
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-white text-stone-400 text-[10px] tracking-[0.3em] uppercase font-bold text-center border-t border-stone-100">
                        <div className="flex justify-center gap-8 mb-4">
                             <a href={SOCIAL_LINKS.instagram} target="_blank" className="hover:text-sky-600 transition-colors">Instagram</a>
                             <a href={SOCIAL_LINKS.facebook} target="_blank" className="hover:text-sky-600 transition-colors">Facebook</a>
                        </div>
                        <p className="text-stone-300">© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
