<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
            background-color: #0c0a09; 
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        
        html { scroll-behavior: smooth; }

        /* Realistic Gallery Frame Style */
        .art-frame {
            position: relative;
            display: inline-block;
            background: #fdfbf9; /* White matting */
            padding: 16px; /* Mat width */
            box-shadow: 
                0 0 0 10px #1c1917, /* Dark charcoal/black wooden frame */
                0 25px 30px -5px rgba(0,0,0,0.6); /* Heavy drop shadow */
            transition: all 0.4s ease;
        }
        .group:hover .art-frame {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 0 0 10px #1c1917, 
                0 35px 40px -10px rgba(0,0,0,0.8);
        }

        /* Enhanced text shadow for readability on light backgrounds */
        .hero-text-shadow {
            text-shadow: 1px 2px 4px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.6);
        }

        /* Fixed Backgrounds */
        .bg-jumbo {
            background-image: url('jumbo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .bg-footer-art {
            background-image: url('Pasted image (16).png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Gradual Dark-to-Light Transitions */
        .overlay-header { background-color: rgba(0, 0, 0, 0.85); }
        .overlay-bio { background-color: rgba(0, 0, 0, 0.65); } 
        .overlay-shop { background-color: rgba(0, 0, 0, 0.45); } 
        .overlay-exhibition { background-color: rgba(0, 0, 0, 0.25); } 
        .overlay-contact { background-color: rgba(0, 0, 0, 0.10); } /* Almost fully transparent! */

        .contact-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 0;
            transition: all 0.4s ease;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .contact-input:focus {
            border-bottom-color: #38bdf8;
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        .contact-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            text-shadow: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            const SOCIAL_LINKS = {
                facebook: "https://www.facebook.com/victoriawallaceartist",
                instagram: "https://www.instagram.com/victoriawallace.artist"
            };

            const PHONE_NUMBER = "(705) 559-5509";

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const name = formData.get('Name');
                const email = formData.get('Email');
                const message = formData.get('Message');
                const subject = encodeURIComponent(`Inquiry from ${name}`);
                const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
                window.location.href = `mailto:Victoriawallaceartist@gmail.com?subject=${subject}&body=${body}`;
            };

            const products = [
                { id: 'p1', title: 'Blue Dog', category: 'Prints', price: 150, img: 'bluedog.webp', medium: 'Archival Giclée' },
                { id: 'p2', title: 'Celestial Elephant', category: 'Prints', price: 150, img: 'Celestial Elephant.webp', medium: 'Archival Giclée' },
                { id: 'p3', title: 'Husky Dog', category: 'Prints', price: 150, img: 'huskydog.webp', medium: 'Archival Giclée' },
                { id: 'p4', title: 'Mexican Standoff', category: 'Prints', price: 150, img: 'Mexican Standoff.webp', medium: 'Archival Giclée' },
                { id: 'p5', title: 'Red Dog', category: 'Prints', price: 150, img: 'reddog.webp', medium: 'Archival Giclée' },
                { id: 'p6', title: 'Sun Dog', category: 'Prints', price: 150, img: 'Sun Dog.webp', medium: 'Archival Giclée' },
                { id: 'p7', title: 'Top Dog', category: 'Prints', price: 150, img: 'Top Dog.webp', medium: 'Archival Giclée' },
                { id: 'p8', title: 'When Pigs Fly', category: 'Prints', price: 150, img: 'When Pigs Fly.webp', medium: 'Archival Giclée' }
            ];

            const categories = [
                { id: 'Prints', name: 'Fine Art Prints', description: 'Limited edition archival quality reproductions.', img: 'Celestial Elephant.webp' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces. Contact for availability.', img: 'jewel.jpg' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision for your home.', img: 'vicpaint.jpg', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-stone-950/95 backdrop-blur-md shadow-lg py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className="text-xl md:text-2xl font-bold tracking-[0.25em] text-white">
                                VICTORIA WALLACE
                            </a>
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Exhibitions', 'Biography', 'Shop', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-[10px] uppercase tracking-[0.3em] font-bold text-white hover:text-sky-400 transition-colors">
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-jumbo">
                        <div className="absolute inset-0 overlay-header z-0"></div>
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-sky-300 uppercase tracking-[0.6em] text-[11px] font-bold mb-8 opacity-0 animate-fade-in hero-text-shadow">
                                OSA • SCA • Magical Realism
                            </span>
                            <h1 className="text-6xl md:text-[7.5rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up hero-text-shadow font-bold">
                                A Realist <br/>
                                <span className="italic font-light text-sky-100">Gone Awry.</span>
                            </h1>
                            <div className="flex gap-8 justify-center items-center opacity-0 animate-fade-in pt-8">
                                <a href="#shop" className="bg-sky-600 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-sky-700 transition-all shadow-xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* BIOGRAPHY */}
                    <section id="biography" className="relative bg-jumbo">
                        <div className="overlay-bio py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row items-center gap-16 lg:gap-24">
                                    <div className="w-full lg:w-5/12 flex justify-center">
                                        <div className="group">
                                            <div className="art-frame">
                                                <div className="overflow-hidden bg-stone-900 max-w-[340px]">
                                                    <img src="biopic.png" className="w-full aspect-[4/5] object-cover transition-transform duration-700 group-hover:scale-105" alt="Portrait" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="w-full lg:w-7/12">
                                        <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] mb-4 hero-text-shadow">Artist Profile</h2>
                                        <h3 className="text-5xl font-serif mb-8 text-white hero-text-shadow">Victoria <span className="italic font-light text-stone-200">Wallace</span></h3>
                                        <div className="space-y-6 text-stone-100 text-lg leading-relaxed font-light hero-text-shadow">
                                            <p className="font-serif italic text-2xl border-l-4 border-sky-500 pl-6 my-8 text-white">
                                                "I strive to paint a highly realistic view of the world, only to intentionally disrupt it by weaving in magical, impossible elements."
                                            </p>
                                            <p>Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.</p>
                                            <p>Currently based in Peterborough, Ontario, she is an elected member of both the Ontario Society of Artists and the Society of Canadian Artists.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SHOP */}
                    <section id="shop" className="relative bg-jumbo">
                        <div className="overlay-shop py-32 px-6 md:px-12">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-white/20 pb-8">
                                    <div>
                                        <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] mb-4 hero-text-shadow">Official Store</h2>
                                        <h3 className="text-4xl font-serif italic text-white hero-text-shadow">
                                            {view === 'categories' ? 'Collections & Gallery' : activeCategory}
                                        </h3>
                                    </div>
                                    {view === 'products' && (
                                        <button onClick={() => setView('categories')} className="flex items-center gap-2 text-white hover:text-sky-400 font-bold uppercase tracking-widest text-[10px] transition-colors hero-text-shadow">
                                            <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                        </button>
                                    )}
                                </div>

                                {view === 'categories' ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12 max-w-5xl mx-auto">
                                        {categories.map((cat) => (
                                            <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="group cursor-pointer">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-[4/5] bg-stone-900 w-64 md:w-80">
                                                            <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-xl font-serif mb-2 text-white hero-text-shadow">{cat.name}</h4>
                                                    <p className="text-stone-200 text-xs font-light mb-4 px-4 hero-text-shadow">{cat.description}</p>
                                                    <div className="flex items-center justify-center gap-2 text-[10px] font-bold uppercase tracking-widest text-sky-400 hero-text-shadow">
                                                        Explore <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-16 animate-fade-in">
                                        {filteredProducts.map((item) => (
                                            <div key={item.id} className="group">
                                                <div className="flex justify-center mb-10">
                                                    <div className="art-frame">
                                                        <div className="overflow-hidden aspect-square bg-stone-900 w-48">
                                                            <img src={item.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={item.title} />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <h4 className="text-lg font-serif mb-1 text-white hero-text-shadow">{item.title}</h4>
                                                    <p className="text-stone-300 text-[9px] uppercase tracking-widest mb-3 hero-text-shadow">{item.medium}</p>
                                                    <p className="text-sky-300 font-bold text-xs mb-4 hero-text-shadow">${item.price}</p>
                                                    <button className="text-white hover:text-sky-400 font-bold uppercase tracking-widest text-[9px] border-b border-white/20 hover:border-sky-400 transition-all pb-1 hero-text-shadow">
                                                        Purchase Piece
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* EXHIBITIONS */}
                    <section id="exhibitions" className="relative bg-footer-art">
                        <div className="overlay-exhibition py-32 px-6">
                            <div className="max-w-5xl mx-auto text-center">
                                <div className="flex items-center justify-center gap-4 mb-6">
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-400/50"></span>
                                    <h2 className="text-sky-300 font-bold tracking-[0.4em] uppercase text-[10px] hero-text-shadow">Solo Exhibition</h2>
                                    <span className="h-[1px] w-12 md:w-24 bg-sky-400/50"></span>
                                </div>
                                
                                <h3 className="text-5xl md:text-7xl font-serif text-white leading-tight mb-8 hero-text-shadow">
                                    Logic: <span className="italic font-light text-sky-200">Lost in Translation</span>
                                </h3>
                                
                                <div className="flex flex-wrap justify-center gap-4 md:gap-8 mb-10">
                                    <div className="flex items-center gap-2 px-5 py-2 border border-white/30 rounded-full backdrop-blur-sm hero-text-shadow">
                                        <i data-lucide="calendar" className="w-4 h-4 text-sky-300"></i>
                                        <span className="text-white font-bold text-[10px] uppercase tracking-widest">May 1 – 31, 2026</span>
                                    </div>
                                    <div className="flex items-center gap-2 px-5 py-2 border border-white/30 rounded-full backdrop-blur-sm hero-text-shadow">
                                        <i data-lucide="map-pin" className="w-4 h-4 text-sky-300"></i>
                                        <span className="text-white font-bold text-[10px] uppercase tracking-widest">Niagara Pumphouse</span>
                                    </div>
                                </div>
                                
                                <p className="text-stone-100 font-light leading-relaxed text-lg md:text-xl max-w-3xl mx-auto mb-12 hero-text-shadow">
                                    A comprehensive showcase of Victoria's latest magical realist works, exploring the boundary between the plausible and the impossible.
                                </p>
                                
                                <div className="flex flex-col items-center gap-6">
                                    <p className="text-sky-200 text-sm md:text-lg font-serif italic hero-text-shadow">Opening Reception: Sunday, May 3 • 2–4 pm</p>
                                    <a href="#contact" className="text-white border border-sky-400/50 px-8 py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-sky-400/20 hover:border-sky-300 transition-all backdrop-blur-sm hero-text-shadow">
                                        Inquire for Private View
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CONTACT */}
                    <section id="contact" className="relative bg-footer-art">
                        <div className="overlay-contact py-32 px-6">
                            <div className="max-w-7xl mx-auto">
                                <div className="flex flex-col lg:flex-row gap-20 items-center">
                                    <div className="w-full lg:w-1/2">
                                        <div className="flex items-center gap-4 mb-4">
                                            <i data-lucide="palette" className="w-6 h-6 text-sky-400"></i>
                                            <h2 className="text-sky-400 font-bold tracking-[0.4em] uppercase text-[10px] hero-text-shadow">Connect</h2>
                                        </div>
                                        <h3 className="text-5xl md:text-6xl font-serif text-white mb-8 leading-tight hero-text-shadow">
                                            Start a <br/><span className="italic text-sky-200">masterpiece.</span>
                                        </h3>
                                        <div className="space-y-8 text-stone-100 font-light text-lg">
                                            <p className="hero-text-shadow max-w-md">Whether you are interested in custom commissions, gallery representation, or print inquiries, I would love to hear from you.</p>
                                            <div className="space-y-6 pt-8 border-t border-white/20">
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="mail" className="w-5 h-5 text-sky-300 group-hover:scale-110 transition-transform"></i>
                                                    <a href="mailto:Victoriawallaceartist@gmail.com" className="hover:text-sky-300 font-bold transition-colors hero-text-shadow text-base md:text-lg tracking-wide">Victoriawallaceartist@gmail.com</a>
                                                </div>
                                                <div className="flex items-center gap-5 group">
                                                    <i data-lucide="phone" className="w-5 h-5 text-sky-300 group-hover:scale-110 transition-transform"></i>
                                                    <span className="font-bold hero-text-shadow text-base md:text-lg tracking-wide">{PHONE_NUMBER}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="w-full lg:w-1/2">
                                        <form onSubmit={handleFormSubmit} className="space-y-8 bg-black/20 p-8 md:p-12 rounded-sm border border-white/10 backdrop-blur-md shadow-2xl relative">
                                            {/* Decorative artistic corners */}
                                            <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-sky-400/50 rounded-tl-sm"></div>
                                            <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-sky-400/50 rounded-tr-sm"></div>
                                            <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-sky-400/50 rounded-bl-sm"></div>
                                            <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-sky-400/50 rounded-br-sm"></div>

                                            <div className="relative flex items-end">
                                                <i data-lucide="user" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="text" name="Name" required className="w-full contact-input py-2 pl-8" placeholder="Your Name" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="at-sign" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="email" name="Email" required className="w-full contact-input py-2 pl-8" placeholder="your@email.com" />
                                            </div>
                                            <div className="relative flex items-end">
                                                <i data-lucide="phone" className="w-4 h-4 text-sky-300 absolute bottom-3 left-0"></i>
                                                <input type="tel" name="Phone" className="w-full contact-input py-2 pl-8" placeholder="Phone (Optional)" />
                                            </div>
                                            <div className="relative flex items-start pt-2">
                                                <i data-lucide="message-square" className="w-4 h-4 text-sky-300 absolute top-4 left-0"></i>
                                                <textarea name="Message" rows="3" required className="w-full contact-input py-2 pl-8 resize-none" placeholder="What's on your mind?"></textarea>
                                            </div>
                                            <button type="submit" className="group w-full flex items-center justify-center gap-3 border border-sky-400/50 text-white py-4 font-bold uppercase tracking-widest text-[11px] hover:bg-sky-400/20 hover:border-sky-300 transition-all shadow-xl mt-4 backdrop-blur-sm">
                                                <span>Send Inquiry</span>
                                                <i data-lucide="send" className="w-4 h-4 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-950 text-stone-500 text-[10px] tracking-[0.3em] uppercase font-bold text-center border-t border-white/5">
                        <div className="flex justify-center gap-8 mb-4">
                             <a href={SOCIAL_LINKS.instagram} target="_blank" className="hover:text-sky-400 transition-colors">Instagram</a>
                             <a href={SOCIAL_LINKS.facebook} target="_blank" className="hover:text-sky-400 transition-colors">Facebook</a>
                        </div>
                        <p className="text-stone-600">© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
