<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Base styles for responsiveness */
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll globally */
            width: 100%;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        
        /* Smooth transitions */
        html { scroll-behavior: smooth; }

        /* Prevent text from breaking out of containers */
        p, h1, h2, h3, h4, span {
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        /* Fluid Typography specifically for high-res tablets like iPad Pro */
        .fluid-heading-xl {
            font-size: clamp(3rem, 10vw, 8rem);
        }
        .fluid-heading-lg {
            font-size: clamp(2rem, 8vw, 5rem);
        }

        /* Paper Texture Effect */
        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        /* Responsive Portrait Frame */
        .portrait-frame::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid #c2410c;
            z-index: -1;
            transition: all 0.5s ease;
        }
        
        /* Mobile adjustment for frame */
        @media (max-width: 768px) {
            .portrait-frame::after {
                top: 10px;
                left: 10px;
                right: -10px;
                bottom: -10px;
            }
        }
    </style>
</head>
<body className="bg-[#fdfbf9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const products = [
                { id: 'p1', title: 'Limited Edition Print 01', category: 'Prints', price: 150, img: 'Pasted image.png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK1' },
                { id: 'p2', title: 'Limited Edition Print 02', category: 'Prints', price: 150, img: 'Pasted image (2).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK2' },
                { id: 'p3', title: 'Limited Edition Print 03', category: 'Prints', price: 150, img: 'Pasted image (3).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK3' },
                { id: 'p4', title: 'Limited Edition Print 04', category: 'Prints', price: 150, img: 'Pasted image (4).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK4' },
                { id: 'p5', title: 'Limited Edition Print 05', category: 'Prints', price: 150, img: 'Pasted image (5).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK5' },
                { id: 'p6', title: 'Limited Edition Print 06', category: 'Prints', price: 150, img: 'Pasted image (6).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK6' },
                { id: 'p7', title: 'Limited Edition Print 07', category: 'Prints', price: 150, img: 'Pasted image (7).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK7' },
                { id: 'p8', title: 'Limited Edition Print 08', category: 'Prints', price: 150, img: 'Pasted image (8).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK8' },
                { id: 'p9', title: 'Limited Edition Print 09', category: 'Prints', price: 150, img: 'Pasted image (9).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK9' },
            ];

            const categories = [
                { id: 'Originals', name: 'Original Artwork', description: 'One-of-a-kind paintings directly from Victoria\'s studio.', img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800' },
                { id: 'Prints', name: 'Fine Art Prints', description: 'Nine select limited edition archival quality reproductions.', img: 'Pasted image (5).png' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces and bespoke jewelry.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const exhibitions = [
                {
                    title: "Logic: Lost in Translation",
                    location: "Niagara Pumphouse Arts Centre",
                    date: "May 01 - June 28, 2026",
                    description: "An evocative solo exhibition exploring the boundaries of realism and conceptual narrative.",
                    link: "https://niagarapumphouse.ca/exhibitions/logic-lost-in-translation-victoria-wallace-may-01-2026"
                }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.hash = "contact";
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                setTimeout(() => {
                    document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            return (
                <div className="w-full min-h-screen bg-[#fdfbf9] text-stone-900 selection:bg-orange-200">
                    
                    {/* Navigation - Enhanced for touch/tablet */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white shadow-md py-4' : 'bg-transparent py-6 md:py-8'}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-12 flex justify-between items-center">
                            <a href="#" className={`text-lg md:text-2xl font-bold tracking-[0.2em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            
                            {/* Simple Mobile/Tablet Nav */}
                            <div className="flex space-x-4 sm:space-x-8 items-center">
                                <a href="#shop" className={`text-[9px] sm:text-[10px] uppercase tracking-[0.2em] font-bold ${isScrolled ? 'text-stone-600' : 'text-white'}`}>Shop</a>
                                <a href="#contact" className={`text-[9px] sm:text-[10px] uppercase tracking-[0.2em] font-bold ${isScrolled ? 'text-stone-600' : 'text-white'}`}>Contact</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section - Strict Container */}
                    <section className="relative h-[85vh] min-h-[500px] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0">
                            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.4]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/20"></div>
                        </div>
                        
                        <div className="relative z-10 w-full max-w-7xl mx-auto px-6 text-center">
                            <span className="block text-orange-200 uppercase tracking-[0.4em] text-[9px] sm:text-[10px] font-bold mb-6">
                                Ontario Society of Artists • Society of Canadian Artists
                            </span>
                            <h1 className="fluid-heading-xl font-serif text-white mb-8 tracking-tighter leading-tight">
                                A Realist <br className="hidden sm:block"/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="pt-6">
                                <a href="#shop" className="inline-block bg-orange-700 text-white px-8 sm:px-12 py-4 sm:py-5 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section - Strict Max Widths */}
                    <section id="biography" className="relative py-24 md:py-40 bg-[#fdfbf9] paper-texture overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <div className="flex flex-col lg:flex-row gap-16 lg:items-center">
                                
                                {/* Image Box - Fixed for Tablet sizes */}
                                <div className="w-full lg:w-5/12 max-w-md mx-auto lg:mx-0">
                                    <div className="portrait-frame relative z-10">
                                        <img 
                                            src="biopic.jpg" 
                                            className="w-full h-auto object-cover rounded-sm shadow-xl grayscale" 
                                            alt="Victoria Wallace"
                                        />
                                    </div>
                                </div>

                                {/* Text Box */}
                                <div className="w-full lg:w-7/12">
                                    <div className="max-w-2xl">
                                        <div className="flex items-center gap-4 mb-6">
                                            <span className="h-[1px] w-8 bg-orange-700"></span>
                                            <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[9px]">Artist Profile</h2>
                                        </div>
                                        
                                        <h3 className="fluid-heading-lg font-serif mb-8 leading-tight">
                                            Victoria <span className="italic font-light text-stone-400">Wallace</span>
                                        </h3>
                                        
                                        <div className="space-y-6 text-stone-600 text-base md:text-lg leading-relaxed font-light">
                                            <p className="text-stone-900 font-medium">
                                                Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her mural painting years.
                                            </p>
                                            <p>Juxtaposing realistic subject matter within fantastical scenarios, she embeds subtle humor and hidden messages covertly into every artwork.</p>
                                            <p>Her works reside in private collections worldwide, continuing to challenge the viewer's perception of the familiar.</p>
                                        </div>

                                        <div className="mt-12">
                                            <p className="font-signature text-3xl text-stone-800">Victoria Wallace</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Exhibitions Section - Tablet Grid Fix */}
                    <section id="exhibitions" className="relative py-20 md:py-32 px-6 md:px-12 bg-stone-950 overflow-hidden">
                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="mb-16">
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">News & Events</h2>
                                <h3 className="fluid-heading-lg font-serif italic text-white leading-none">Exhibitions</h3>
                            </div>
                            
                            <div className="max-w-4xl">
                                {exhibitions.map((event, idx) => (
                                    <div key={idx} className="bg-white/5 border border-white/10 p-6 md:p-10 rounded-sm mb-8">
                                        <div className="flex flex-col sm:flex-row justify-between items-start gap-6">
                                            <div className="flex-grow">
                                                <p className="text-orange-500 font-bold tracking-widest text-[10px] uppercase mb-2">{event.date}</p>
                                                <h4 className="text-2xl md:text-4xl font-serif text-white mb-2 leading-tight">{event.title}</h4>
                                                <p className="text-orange-100/60 font-medium italic text-sm md:text-base mb-4">{event.location}</p>
                                                <p className="text-stone-300 font-light text-sm md:text-base leading-relaxed">{event.description}</p>
                                            </div>
                                            <a href={event.link} target="_blank" className="w-full sm:w-auto text-center bg-white text-stone-900 px-6 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all">
                                                View Details
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Shop Section - Responsive Grid */}
                    <section id="shop" className="py-24 px-6 md:px-12 bg-[#f9f7f5] scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="border-b border-stone-200 pb-10 mb-12 flex flex-col md:flex-row justify-between items-end gap-6">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-3">Official Store</h2>
                                    <h3 className="text-3xl md:text-5xl font-serif italic">{view === 'categories' ? 'Collections' : activeCategory}</h3>
                                </div>
                                {view === 'products' && (
                                    <button onClick={() => setView('categories')} className="text-stone-400 hover:text-orange-700 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back
                                    </button>
                                )}
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {view === 'categories' ? categories.map((cat) => (
                                    <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="cursor-pointer group bg-white p-4 border border-stone-100 hover:shadow-xl transition-all h-full flex flex-col">
                                        <div className="aspect-[4/5] overflow-hidden mb-4 bg-stone-200">
                                            <img src={cat.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        </div>
                                        <h4 className="text-lg font-serif mb-2">{cat.name}</h4>
                                        <p className="text-stone-500 text-xs leading-relaxed flex-grow">{cat.description}</p>
                                    </div>
                                )) : filteredProducts.map((item) => (
                                    <div key={item.id} className="bg-white p-5 border border-stone-100 shadow-sm flex flex-col h-full">
                                        <img src={item.img} className="w-full aspect-square object-cover mb-4" />
                                        <h4 className="text-xl font-serif mb-1">{item.title}</h4>
                                        <p className="text-stone-500 font-bold text-xs mb-1">${item.price}</p>
                                        <p className="text-stone-400 text-[10px] uppercase mb-6">{item.medium}</p>
                                        <a href={item.squareUrl} target="_blank" className="w-full bg-stone-900 text-white py-3 text-center text-[10px] font-bold uppercase tracking-widest mt-auto">Purchase</a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Workshops - Simple Flex */}
                    <section id="workshops" className="relative py-24 px-6 bg-stone-900 overflow-hidden">
                        <div className="relative z-10 max-w-3xl mx-auto text-center">
                            <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-6">Education</h2>
                            <h3 className="text-3xl md:text-5xl font-serif text-white mb-6">Learn the Alchemy</h3>
                            <p className="text-stone-300 text-sm md:text-base leading-relaxed mb-8">Professional instruction in Encaustic and Acrylics. Sessions available via Zoom or in-person at her Hamilton studio.</p>
                            <a href="#contact" className="inline-block bg-orange-700 text-white px-8 py-4 text-[10px] font-bold uppercase tracking-widest">Inquire</a>
                        </div>
                    </section>

                    {/* Contact Section - Wrap fixed */}
                    <section id="contact" className="py-24 px-6 bg-[#1a1918] text-white overflow-hidden">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-16 lg:gap-24">
                            <div className="w-full lg:w-1/2">
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Contact</h2>
                                <h3 className="text-3xl md:text-5xl font-serif mb-8 leading-tight">Bring the Uncanny into your space.</h3>
                                <div className="space-y-6">
                                    <div className="flex items-center gap-4 break-all">
                                        <i data-lucide="mail" className="text-orange-400 w-5 h-5 shrink-0"></i>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-sm md:text-base border-b border-stone-800 pb-1">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <i data-lucide="phone" className="text-orange-400 w-5 h-5 shrink-0"></i>
                                        <a href="tel:+17055595509" className="text-sm md:text-base">(705) 559-5509</a>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-1/2 bg-stone-900 p-8">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-4">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-4 text-sm outline-none focus:border-orange-500" placeholder="Email Address" />
                                    <textarea name="Message" rows="4" required className="w-full bg-stone-950 border border-stone-800 p-4 text-sm outline-none focus:border-orange-500" placeholder="Message"></textarea>
                                    <button type="submit" className="w-full bg-orange-700 py-4 font-bold uppercase tracking-widest text-[10px]">Send</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-stone-950 text-stone-600 text-[9px] tracking-[0.2em] uppercase font-bold text-center px-4">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
