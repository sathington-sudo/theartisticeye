<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel for browser transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        .animate-delay { animation-delay: 0.8s; }
        
        html { scroll-behavior: smooth; }

        .category-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [view, setView] = useState('categories'); // 'categories' or 'products'
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            // Nine placeholders for Prints, linked to Square with updated .png extensions
            const products = [
                { id: 'p1', title: 'Limited Edition Print 01', category: 'Prints', price: 150, img: 'Pasted image.png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_1' },
                { id: 'p2', title: 'Limited Edition Print 02', category: 'Prints', price: 150, img: 'Pasted image (2).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_2' },
                { id: 'p3', title: 'Limited Edition Print 03', category: 'Prints', price: 150, img: 'Pasted image (3).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_3' },
                { id: 'p4', title: 'Limited Edition Print 04', category: 'Prints', price: 150, img: 'Pasted image (4).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_4' },
                { id: 'p5', title: 'Limited Edition Print 05', category: 'Prints', price: 150, img: 'Pasted image (5).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_5' },
                { id: 'p6', title: 'Limited Edition Print 06', category: 'Prints', price: 150, img: 'Pasted image (6).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_6' },
                { id: 'p7', title: 'Limited Edition Print 07', category: 'Prints', price: 150, img: 'Pasted image (7).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_7' },
                { id: 'p8', title: 'Limited Edition Print 08', category: 'Prints', price: 150, img: 'Pasted image (8).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_8' },
                { id: 'p9', title: 'Limited Edition Print 09', category: 'Prints', price: 150, img: 'Pasted image (9).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/YOUR_SQUARE_LINK_9' },
            ];

            const categories = [
                { id: 'Originals', name: 'Original Artwork', description: 'One-of-a-kind paintings directly from Victoria\'s studio.', img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800' },
                { id: 'Prints', name: 'Fine Art Prints', description: 'Nine select limited edition archival quality reproductions.', img: 'Pasted image (5).png' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces and bespoke jewelry.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen bg-[#fdfbf9] text-stone-900 selection:bg-orange-200">
                    
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/95 backdrop-blur-xl shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Biography', 'Shop', 'Workshops', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-orange-600 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>

                            <div className="md:hidden flex items-center gap-4">
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                    <i data-lucide={isMobileMenuOpen ? "x" : "menu"} className={isScrolled ? 'text-stone-900' : 'text-white'}></i>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.4] contrast-[1.1]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/30"></div>
                        </div>
                        
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-orange-200 uppercase tracking-[0.6em] text-[10px] font-bold mb-8 opacity-0 animate-fade-in">
                                Ontario Society of Artists • Society of Canadian Artists
                            </span>
                            <h1 className="text-6xl md:text-[9rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up">
                                A Realist <br/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in animate-delay pt-8">
                                <a href="#shop" className="bg-orange-700 text-white px-12 py-5 rounded-sm font-bold uppercase tracking-widest text-xs hover:bg-orange-800 transition-all shadow-2xl flex items-center gap-3">
                                    Browse Shop <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section */}
                    <section id="biography" className="py-32 px-6 md:px-12 max-w-7xl mx-auto relative">
                        <div className="absolute -top-24 left-10 text-[15vw] font-serif text-stone-100 -z-10 select-none opacity-50">Identity</div>
                        <div className="flex flex-col lg:flex-row items-start gap-20">
                            <div className="w-full lg:w-5/12">
                                <div className="relative group">
                                    <div className="absolute -inset-4 border border-orange-100 rounded-sm translate-x-2 translate-y-2 group-hover:translate-x-0 group-hover:translate-y-0 transition-transform duration-700"></div>
                                    <img src="biopic.jpg" className="relative z-10 w-full rounded-sm shadow-2xl aspect-[4/5] object-cover" alt="Victoria Wallace" />
                                </div>
                            </div>

                            <div className="w-full lg:w-7/12 pt-4">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-xs mb-8">Biography</h2>
                                <h3 className="text-5xl font-serif mb-10 leading-tight">Victoria Wallace</h3>
                                <div className="space-y-6 text-stone-600 text-lg leading-relaxed font-light text-justify">
                                    <p>Victoria Wallace is a contemporary Canadian artist. Her conceptual mixture of realism and fantasy in her painting practice was shaped by the ‘trompe l’oeil’ influence mastered during her many years of mural painting.</p>
                                    <p>In her artwork, she skillfully creates surrealistic narratives by juxtaposing realistic subject matter within fantastical scenarios. She derives immense joy from the subtle humor and hidden messages covertly embedded in her artworks.</p>
                                    <p>For more than four decades, Victoria Wallace has displayed her paintings in a variety of venues across Toronto, Hamilton, and Europe. Her impact extends into private collections worldwide.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Shop Section */}
                    <section id="shop" className="py-32 px-6 md:px-12 bg-white scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-stone-100 pb-12">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-5xl font-serif leading-none italic">
                                        {view === 'categories' ? 'Curated Collections' : activeCategory}
                                    </h3>
                                </div>
                                {view === 'products' && (
                                    <button 
                                        onClick={() => setView('categories')}
                                        className="flex items-center gap-2 text-stone-400 hover:text-orange-700 font-bold uppercase tracking-widest text-[10px] transition-colors"
                                    >
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                    </button>
                                )}
                            </div>

                            {view === 'categories' ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {categories.map((cat) => (
                                        <div 
                                            key={cat.id} 
                                            onClick={() => handleCategoryClick(cat)}
                                            className="category-card group cursor-pointer flex flex-col h-full bg-stone-50 border border-stone-100 p-4 transition-all hover:shadow-xl hover:border-orange-100"
                                        >
                                            <div className="relative overflow-hidden mb-6 aspect-[4/5] bg-stone-200">
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700" />
                                                <div className="absolute inset-0 bg-stone-900/10 group-hover:bg-transparent transition-colors"></div>
                                            </div>
                                            <h4 className="text-xl font-serif mb-2 group-hover:text-orange-700 transition-colors">{cat.name}</h4>
                                            <p className="text-stone-500 text-sm font-light leading-relaxed mb-6 flex-grow">{cat.description}</p>
                                            <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-orange-700 transition-colors">
                                                {cat.isLink ? 'Commission Work' : 'Explore Gallery'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-16 animate-fade-in">
                                    {filteredProducts.length > 0 ? (
                                        filteredProducts.map((item) => (
                                            <div key={item.id} className="group flex flex-col h-full">
                                                <div className="relative overflow-hidden mb-6 rounded-sm bg-stone-100">
                                                    <img src={item.img} alt={item.title} className="w-full aspect-square object-cover transform group-hover:scale-[1.05] transition-transform duration-[1.5s]" />
                                                </div>
                                                <h4 className="text-2xl font-serif mb-2">{item.title}</h4>
                                                <p className="text-stone-500 font-bold text-sm mb-2">${item.price.toFixed(2)} CAD</p>
                                                <p className="text-stone-400 text-xs uppercase tracking-widest mb-8">{item.medium}</p>
                                                
                                                {item.squareUrl ? (
                                                    <a 
                                                        href={item.squareUrl} 
                                                        target="_blank" 
                                                        className="block text-center w-full bg-stone-900 text-white py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-700 transition-colors"
                                                    >
                                                        Purchase on Square
                                                    </a>
                                                ) : (
                                                    <button className="block text-center w-full bg-stone-100 text-stone-400 py-4 font-bold uppercase tracking-widest text-[10px] cursor-default">
                                                        Currently Unavailable
                                                    </button>
                                                )}
                                            </div>
                                        ))
                                    ) : (
                                        <div className="col-span-full py-24 text-center border-2 border-dashed border-stone-100 bg-stone-50/50 rounded-sm">
                                            <i data-lucide="sparkles" className="w-8 h-8 text-orange-200 mx-auto mb-4"></i>
                                            <p className="text-stone-400 font-serif italic text-2xl">This collection is being curated.</p>
                                            <p className="text-stone-400 text-xs uppercase tracking-[0.2em] mt-4 font-bold">Please check back soon for updates.</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Workshops Section */}
                    <section id="workshops" className="relative py-32 flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.25]" alt="Art Studio Background" />
                        </div>
                        <div className="relative z-10 max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-xs mb-6">Education & Mentorship</h2>
                            <h3 className="text-5xl md:text-6xl font-serif text-white leading-tight mb-8">Learn the <span className="italic text-orange-200">Alchemy</span></h3>
                            <p className="text-stone-300 text-lg md:text-xl font-light leading-relaxed mb-10 max-w-2xl mx-auto">
                                Victoria offers professional instruction and private mentorship in specialized mediums, including Encaustic and Acrylics. Sessions are available via Zoom or in-person at her Hamilton studio.
                            </p>
                            <a href="#contact" className="inline-flex items-center gap-3 bg-orange-700 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-600 transition-colors shadow-2xl">
                                Inquire about Workshops <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </a>
                        </div>
                    </section>

                    {/* Credentials Section */}
                    <section id="credentials" className="py-32 px-6 md:px-12 border-t border-stone-100 bg-[#fdfbf9]">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div className="lg:col-span-7">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-xs mb-8">Curriculum Vitae</h2>
                                <h3 className="text-4xl font-serif mb-12">Education & Affiliations</h3>
                                <ul className="space-y-6 text-sm font-light text-stone-600">
                                    {[
                                        ["2018–Present", "Elected Member, Ontario Society of Artists & Society of Canadian Artists"],
                                        ["2013–Present", "Art Instructor, Fleming College - Haliburton School of Art + Design"],
                                        ["2013–Present", "Golden Artist Educator at Golden Artist Colors"],
                                        ["2009–Present", "R&F Certified Encaustic Instructor"],
                                        ["2008–2023", "Co-Owner and Co-Founder, Victory Art Supply"],
                                        ["1985–1986", "Architectural Drafting, Humber College"],
                                        ["1983–1985", "Fine Art, George Brown College"]
                                    ].map(([year, text], idx) => (
                                        <li key={idx} className={`grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-4 ${idx !== 6 ? 'border-b border-stone-100 pb-6' : ''}`}>
                                            <span className="font-bold text-stone-900 tracking-widest text-xs uppercase">{year}</span>
                                            <span>{text}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-32 bg-[#1a1918] text-white px-6 border-t-[12px] border-orange-700">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Get In Touch</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-tight">Bring <span className="italic text-orange-200 font-light">The Uncanny</span> into your space.</h3>
                                <div className="space-y-8 mt-16">
                                    <div className="flex items-center gap-6 group">
                                        <div className="w-16 h-16 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center group-hover:border-orange-500 transition-colors">
                                            <i data-lucide="mail" className="text-orange-400 w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold mb-1">Direct Email</p>
                                            <a href="mailto:Victoriawallaceartist@gmail.com" className="text-lg hover:text-orange-400 transition-colors">Victoriawallaceartist@gmail.com</a>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6 group">
                                        <div className="w-16 h-16 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center group-hover:border-orange-500 transition-colors">
                                            <i data-lucide="phone" className="text-orange-400 w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <p className="text-[10px] uppercase tracking-[0.2em] text-stone-500 font-bold mb-1">Studio Phone</p>
                                            <a href="tel:+17055595509" className="text-lg hover:text-orange-400 transition-colors">(705) 559-5509</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-stone-900 p-8 md:p-12 rounded-sm shadow-2xl">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="hidden" name="_subject" value="New Inquiry from Victoria Wallace Portfolio" />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <input type="text" name="First Name" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:outline-none focus:border-orange-500" placeholder="First Name" />
                                        <input type="text" name="Last Name" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:outline-none focus:border-orange-500" placeholder="Last Name" />
                                    </div>
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:outline-none focus:border-orange-500" placeholder="Email Address" />
                                    <textarea name="Message" rows="4" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:outline-none focus:border-orange-500 resize-none" placeholder="How can I help you?"></textarea>
                                    <button type="submit" className="w-full bg-orange-700 text-white py-5 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-600 transition-colors rounded-sm flex justify-center items-center gap-3">
                                        Send Message <i data-lucide="arrow-right" className="w-4 h-4"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 bg-stone-950 text-stone-500 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
