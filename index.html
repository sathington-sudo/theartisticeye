<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        html { scroll-behavior: smooth; }

        /* iPad Pro & Mobile Bleed Prevention */
        p, h1, h2, h3, h4, span {
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .fluid-heading-xl {
            font-size: clamp(2.8rem, 9vw, 7.5rem);
        }
        .fluid-heading-lg {
            font-size: clamp(2rem, 7vw, 4.5rem);
        }

        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        /* Decorative Background Collage Elements */
        .collage-bg {
            position: absolute;
            pointer-events: none;
            opacity: 0.07; /* Faded into background */
            z-index: 0;
            filter: grayscale(100%);
        }

        .portrait-frame::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            border: 1px solid #c2410c;
            z-index: -1;
        }
        
        @media (max-width: 768px) {
            .portrait-frame::after {
                top: 10px;
                left: 10px;
                right: -10px;
                bottom: -10px;
            }
        }
    </style>
</head>
<body class="bg-[#fdfbf9]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll, { passive: true });
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            // Original high-res stock for main categories (as before)
            const categories = [
                { id: 'Originals', name: 'Original Artwork', description: 'One-of-a-kind paintings directly from Victoria\'s studio.', img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800' },
                { id: 'Prints', name: 'Fine Art Prints', description: 'Archival quality reproductions of select limited edition works.', img: 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?auto=format&fit=crop&q=80&w=800' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces and bespoke jewelry designs.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const products = [
                { id: 'p1', title: 'Limited Edition Print 01', category: 'Prints', price: 150, img: 'Pasted image.png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK1' },
                { id: 'p2', title: 'Limited Edition Print 02', category: 'Prints', price: 150, img: 'Pasted image (2).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK2' },
                { id: 'p3', title: 'Limited Edition Print 03', category: 'Prints', price: 150, img: 'Pasted image (3).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK3' },
                { id: 'p4', title: 'Limited Edition Print 04', category: 'Prints', price: 150, img: 'Pasted image (4).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK4' },
                { id: 'p5', title: 'Limited Edition Print 05', category: 'Prints', price: 150, img: 'Pasted image (5).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK5' },
                { id: 'p6', title: 'Limited Edition Print 06', category: 'Prints', price: 150, img: 'Pasted image (6).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK6' },
                { id: 'p7', title: 'Limited Edition Print 07', category: 'Prints', price: 150, img: 'Pasted image (7).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK7' },
                { id: 'p8', title: 'Limited Edition Print 08', category: 'Prints', price: 150, img: 'Pasted image (8).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK8' },
                { id: 'p9', title: 'Limited Edition Print 09', category: 'Prints', price: 150, img: 'Pasted image (9).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK9' },
            ];

            const exhibitions = [
                {
                    title: "Logic: Lost in Translation",
                    location: "Niagara Pumphouse Arts Centre",
                    date: "May 01 - June 28, 2026",
                    description: "An evocative solo exhibition exploring the boundaries of realism and conceptual narrative.",
                    link: "https://niagarapumphouse.ca/exhibitions/logic-lost-in-translation-victoria-wallace-may-01-2026"
                }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    document.getElementById('contact').scrollIntoView({ behavior: 'smooth' });
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                setTimeout(() => {
                    document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
                }, 100);
            };

            return (
                <div className="w-full min-h-screen bg-[#fdfbf9] text-stone-900 selection:bg-orange-200">
                    
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white shadow-md py-4' : 'bg-transparent py-6 md:py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 lg:px-12 flex justify-between items-center">
                            <a href="#" className={`text-lg md:text-2xl font-bold tracking-[0.2em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            <div className="flex space-x-6 sm:space-x-10 items-center uppercase tracking-[0.25em] text-[9px] font-bold">
                                <a href="#biography" className={isScrolled ? 'text-stone-600' : 'text-white'}>Bio</a>
                                <a href="#exhibitions" className={isScrolled ? 'text-stone-600' : 'text-white'}>Events</a>
                                <a href="#shop" className={isScrolled ? 'text-stone-600' : 'text-white'}>Shop</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[85vh] min-h-[600px] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0">
                            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.4]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/30"></div>
                        </div>
                        
                        <div className="relative z-10 w-full max-w-7xl mx-auto px-6 text-center">
                            <span className="block text-orange-200 uppercase tracking-[0.5em] text-[10px] font-bold mb-8">
                                Ontario Society of Artists • Society of Canadian Artists
                            </span>
                            <h1 className="fluid-heading-xl font-serif text-white mb-10 tracking-tighter leading-tight">
                                A Realist <br className="hidden sm:block"/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="pt-4">
                                <a href="#shop" className="inline-block bg-orange-700 text-white px-10 py-5 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-800 transition-all shadow-2xl">
                                    Browse Shop
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section - With Collaged Background Elements */}
                    <section id="biography" className="relative py-24 md:py-40 bg-[#fdfbf9] paper-texture overflow-hidden">
                        {/* Background Collage Elements */}
                        <img src="Pasted image (2).png" className="collage-bg top-20 right-[-5%] w-96 hidden lg:block" />
                        <img src="Pasted image (3).png" className="collage-bg bottom-0 left-[-5%] w-80 hidden lg:block" />
                        
                        <div className="max-w-7xl mx-auto px-6 md:px-12 relative z-10">
                            <div className="flex flex-col lg:flex-row gap-20 lg:items-center">
                                <div className="w-full lg:w-5/12">
                                    <div className="portrait-frame relative">
                                        <img src="biopic.jpg" className="w-full h-auto object-cover rounded-sm shadow-2xl grayscale" alt="Victoria Wallace" />
                                    </div>
                                </div>

                                <div className="w-full lg:w-7/12">
                                    <div className="max-w-2xl">
                                        <div className="flex items-center gap-4 mb-8">
                                            <span className="h-[1px] w-12 bg-orange-700"></span>
                                            <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px]">Artist Profile</h2>
                                        </div>
                                        <h3 className="fluid-heading-lg font-serif mb-10 leading-tight">
                                            Victoria <span className="italic font-light text-stone-400">Wallace</span>
                                        </h3>
                                        <div className="space-y-8 text-stone-600 text-lg leading-relaxed font-light">
                                            <p className="text-stone-900 font-medium leading-relaxed">
                                                Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her mural painting years.
                                            </p>
                                            <p>Juxtaposing realistic subject matter within fantastical scenarios, she embeds subtle humor and hidden messages covertly into every artwork.</p>
                                        </div>
                                        <div className="mt-12">
                                            <p className="font-signature text-4xl text-stone-800">Victoria Wallace</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Exhibitions Section */}
                    <section id="exhibitions" className="relative py-24 md:py-40 px-6 md:px-12 bg-stone-950 overflow-hidden">
                        {/* Background Collage Element */}
                        <img src="Pasted image (6).png" className="collage-bg top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl opacity-[0.03]" />
                        
                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="mb-20">
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">News & Events</h2>
                                <h3 className="fluid-heading-lg font-serif italic text-white leading-none">Exhibitions</h3>
                            </div>
                            
                            <div className="max-w-4xl">
                                {exhibitions.map((event, idx) => (
                                    <div key={idx} className="bg-white/5 border border-white/10 p-8 md:p-12 rounded-sm mb-8">
                                        <p className="text-orange-500 font-bold tracking-widest text-[10px] uppercase mb-4">{event.date}</p>
                                        <h4 className="text-3xl md:text-5xl font-serif text-white mb-4 leading-tight">{event.title}</h4>
                                        <p className="text-orange-100/60 font-medium italic text-lg mb-6">{event.location}</p>
                                        <p className="text-stone-300 font-light text-base leading-relaxed mb-10">{event.description}</p>
                                        <a href={event.link} target="_blank" className="inline-block bg-white text-stone-900 px-8 py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-orange-500 hover:text-white transition-all shadow-xl">
                                            View Details
                                        </a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Shop Section */}
                    <section id="shop" className="relative py-24 px-6 md:px-12 bg-[#f9f7f5] scroll-mt-20 overflow-hidden">
                        {/* Background Collage Element */}
                        <img src="Pasted image (5).png" className="collage-bg bottom-[-10%] right-[-5%] w-96 opacity-[0.05]" />
                        <img src="Pasted image (9).png" className="collage-bg top-[10%] left-[-5%] w-80 opacity-[0.05]" />

                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="border-b border-stone-200 pb-12 mb-16 flex flex-col md:flex-row justify-between items-end gap-6">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-4xl md:text-6xl font-serif italic">{view === 'categories' ? 'Collections' : activeCategory}</h3>
                                </div>
                                {view === 'products' && (
                                    <button onClick={() => setView('categories')} className="text-stone-400 hover:text-orange-700 font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 mb-2">
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back
                                    </button>
                                )}
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                                {view === 'categories' ? categories.map((cat) => (
                                    <div key={cat.id} onClick={() => handleCategoryClick(cat)} className="cursor-pointer group bg-white p-5 border border-stone-100 hover:shadow-2xl transition-all h-full flex flex-col">
                                        <div className="aspect-[4/5] overflow-hidden mb-6 bg-stone-200">
                                            <img src={cat.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                        </div>
                                        <h4 className="text-xl font-serif mb-2">{cat.name}</h4>
                                        <p className="text-stone-500 text-xs leading-relaxed flex-grow font-light">{cat.description}</p>
                                    </div>
                                )) : products.map((item) => (
                                    <div key={item.id} className="bg-white p-6 border border-stone-100 shadow-sm flex flex-col h-full">
                                        <div className="aspect-square overflow-hidden mb-6 bg-stone-100">
                                            <img src={item.img} className="w-full h-full object-cover" />
                                        </div>
                                        <h4 className="text-2xl font-serif mb-2">{item.title}</h4>
                                        <p className="text-stone-500 font-bold text-sm mb-2">${item.price}</p>
                                        <p className="text-stone-400 text-[10px] uppercase tracking-widest mb-10">{item.medium}</p>
                                        <a href={item.squareUrl} target="_blank" className="w-full bg-stone-900 text-white py-4 text-center text-[10px] font-bold uppercase tracking-widest hover:bg-orange-700 transition-colors mt-auto">Purchase Now</a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-24 px-6 md:px-12 bg-[#1a1918] text-white overflow-hidden relative">
                        {/* Background Collage Element */}
                        <img src="Pasted image (7).png" className="collage-bg bottom-0 left-0 w-full max-w-lg opacity-[0.04]" />

                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 lg:gap-32 relative z-10">
                            <div className="w-full lg:w-1/2">
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Contact</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-10 leading-tight">Bring <span className="italic text-orange-200">The Uncanny</span> into your space.</h3>
                                <div className="space-y-10">
                                    <div className="flex items-center gap-6 group">
                                        <div className="w-12 h-12 rounded-full border border-stone-800 flex items-center justify-center">
                                            <i data-lucide="mail" className="text-orange-400 w-5 h-5"></i>
                                        </div>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-lg md:text-xl border-b border-stone-800 pb-1">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full lg:w-1/2 bg-stone-900 p-10 md:p-16">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500" placeholder="Email Address" />
                                    <textarea name="Message" rows="5" required className="w-full bg-stone-950 border border-stone-800 p-5 text-sm outline-none focus:border-orange-500" placeholder="Your Message"></textarea>
                                    <button type="submit" className="w-full bg-orange-700 py-5 font-bold uppercase tracking-widest text-[10px]">Send Message</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-16 bg-stone-950 text-stone-600 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
