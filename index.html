<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Wallace | Fine Artist & Store</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React and Babel for browser transpilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        .animate-slide-up { animation: slideUp 1s ease-out 0.3s forwards; }
        .animate-delay { animation-delay: 0.8s; }
        
        html { scroll-behavior: smooth; }

        .category-card:hover img {
            transform: scale(1.05);
        }

        /* Paper Texture Effect */
        .paper-texture {
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        /* Subtle Portrait Frame */
        .portrait-frame::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: -20px;
            bottom: -20px;
            border: 1px solid #c2410c; /* orange-700 */
            z-index: -1;
            transition: all 0.5s ease;
        }
        .portrait-frame:hover::after {
            top: 10px;
            left: 10px;
            right: -10px;
            bottom: -10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [view, setView] = useState('categories'); 
            const [activeCategory, setActiveCategory] = useState(null);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                window.lucide.createIcons();
            }, [view, activeCategory]);

            const products = [
                { id: 'p1', title: 'Limited Edition Print 01', category: 'Prints', price: 150, img: 'Pasted image.png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK1' },
                { id: 'p2', title: 'Limited Edition Print 02', category: 'Prints', price: 150, img: 'Pasted image (2).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK2' },
                { id: 'p3', title: 'Limited Edition Print 03', category: 'Prints', price: 150, img: 'Pasted image (3).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK3' },
                { id: 'p4', title: 'Limited Edition Print 04', category: 'Prints', price: 150, img: 'Pasted image (4).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK4' },
                { id: 'p5', title: 'Limited Edition Print 05', category: 'Prints', price: 150, img: 'Pasted image (5).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK5' },
                { id: 'p6', title: 'Limited Edition Print 06', category: 'Prints', price: 150, img: 'Pasted image (6).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK6' },
                { id: 'p7', title: 'Limited Edition Print 07', category: 'Prints', price: 150, img: 'Pasted image (7).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK7' },
                { id: 'p8', title: 'Limited Edition Print 08', category: 'Prints', price: 150, img: 'Pasted image (8).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK8' },
                { id: 'p9', title: 'Limited Edition Print 09', category: 'Prints', price: 150, img: 'Pasted image (9).png', medium: 'Archival Giclée', squareUrl: 'https://square.link/u/LINK9' },
            ];

            const categories = [
                { id: 'Originals', name: 'Original Artwork', description: 'One-of-a-kind paintings directly from Victoria\'s studio.', img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800' },
                { id: 'Prints', name: 'Fine Art Prints', description: 'Nine select limited edition archival quality reproductions.', img: 'Pasted image (5).png' },
                { id: 'Jewelry', name: 'Handcrafted Jewelry', description: 'Unique wearable art pieces and bespoke jewelry.', img: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&q=80&w=800' },
                { id: 'Commission', name: 'Custom Commissions', description: 'Collaborate on a unique vision tailored to your home.', img: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?auto=format&fit=crop&q=80&w=800', isLink: true, link: '#contact' }
            ];

            const exhibitions = [
                {
                    title: "Logic: Lost in Translation",
                    location: "Niagara Pumphouse Arts Centre",
                    date: "May 01 - June 28, 2026",
                    description: "An evocative solo exhibition exploring the boundaries of realism and conceptual narrative.",
                    link: "https://niagarapumphouse.ca/exhibitions/logic-lost-in-translation-victoria-wallace-may-01-2026"
                }
            ];

            const handleCategoryClick = (cat) => {
                if (cat.isLink) {
                    window.location.href = cat.link;
                    return;
                }
                setActiveCategory(cat.id);
                setView('products');
                document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
            };

            const filteredProducts = products.filter(p => p.category === activeCategory);

            return (
                <div className="min-h-screen bg-[#fdfbf9] text-stone-900 selection:bg-orange-200">
                    
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white shadow-sm py-4' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <a href="#" className={`text-xl md:text-2xl font-bold tracking-[0.25em] transition-colors duration-500 ${isScrolled ? 'text-stone-900' : 'text-white'}`}>
                                VICTORIA WALLACE
                            </a>
                            
                            <div className="hidden md:flex space-x-10 items-center">
                                {['Biography', 'Exhibitions', 'Shop', 'Workshops', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className={`text-[10px] uppercase tracking-[0.3em] font-bold hover:text-orange-600 transition-colors ${isScrolled ? 'text-stone-600' : 'text-white'}`}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[90vh] flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.4] contrast-[1.1]" />
                            <div className="absolute inset-0 bg-gradient-to-t from-[#fdfbf9] via-transparent to-black/30"></div>
                        </div>
                        
                        <div className="relative z-10 text-center px-6 max-w-5xl mx-auto">
                            <span className="inline-block text-orange-200 uppercase tracking-[0.6em] text-[10px] font-bold mb-8 opacity-0 animate-fade-in">
                                Ontario Society of Artists • Society of Canadian Artists
                            </span>
                            <h1 className="text-6xl md:text-[8rem] font-serif text-white mb-8 tracking-tighter leading-[0.85] opacity-0 animate-slide-up">
                                A Realist <br/>
                                <span className="italic font-light text-orange-100">Gone Awry.</span>
                            </h1>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-8 opacity-0 animate-fade-in animate-delay pt-8">
                                <a href="#shop" className="bg-orange-700 text-white px-12 py-5 rounded-sm font-bold uppercase tracking-widest text-xs hover:bg-orange-800 transition-all shadow-2xl flex items-center gap-3">
                                    Browse Shop <i data-lucide="shopping-bag" className="w-4 h-4"></i>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Biography Section - OVERHAULED */}
                    <section id="biography" className="relative py-32 md:py-48 bg-[#fdfbf9] paper-texture overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 md:px-12">
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 lg:gap-24 items-center">
                                
                                {/* Image Column */}
                                <div className="lg:col-span-5 relative">
                                    <div className="portrait-frame relative z-10">
                                        <img 
                                            src="biopic.jpg" 
                                            className="w-full h-auto object-cover rounded-sm shadow-2xl grayscale hover:grayscale-0 transition-all duration-1000" 
                                            alt="Victoria Wallace Portrait"
                                        />
                                    </div>
                                    {/* Floating Year Tag */}
                                    <div className="absolute -bottom-6 -right-6 bg-stone-900 text-white px-8 py-4 z-20 shadow-xl hidden md:block">
                                        <p className="text-[10px] uppercase tracking-[0.4em] font-bold">Studio Established</p>
                                        <p className="text-2xl font-serif">1983</p>
                                    </div>
                                </div>

                                {/* Text Column */}
                                <div className="lg:col-span-7">
                                    <div className="max-w-2xl">
                                        <div className="flex items-center gap-4 mb-8">
                                            <span className="h-[1px] w-12 bg-orange-700"></span>
                                            <h2 className="text-orange-700 font-bold tracking-[0.5em] uppercase text-[10px]">Artist Profile</h2>
                                        </div>
                                        
                                        <h3 className="text-6xl md:text-8xl font-serif mb-12 leading-tight">
                                            Victoria <br/>
                                            <span className="italic font-light text-stone-400">Wallace</span>
                                        </h3>
                                        
                                        <div className="space-y-8 text-stone-600 text-lg md:text-xl leading-relaxed font-light">
                                            <p className="text-stone-900 font-medium leading-relaxed first-letter:text-5xl first-letter:font-serif first-letter:mr-3 first-letter:float-left first-letter:text-orange-700">
                                                Victoria Wallace is a contemporary Canadian artist whose conceptual mixture of realism and fantasy was shaped by the ‘trompe l’oeil’ influence mastered during her years of mural painting.
                                            </p>
                                            <p>
                                                In her artwork, she skillfully creates surrealistic narratives by juxtaposing realistic subject matter within fantastical scenarios. She derives immense joy from the subtle humor and hidden messages covertly embedded in her artworks.
                                            </p>
                                            <p>
                                                For more than four decades, Wallace has displayed her paintings across Toronto, Hamilton, and Europe. Her impact extends into private collections worldwide, continuing to challenge the viewer's perception of the familiar.
                                            </p>
                                        </div>

                                        <div className="mt-16 flex flex-col sm:flex-row items-start sm:items-center gap-12">
                                            <div>
                                                <p className="font-signature text-4xl text-stone-800">Victoria Wallace</p>
                                                <p className="text-[10px] uppercase tracking-widest font-bold text-stone-400 mt-2">Signature Style Artist</p>
                                            </div>
                                            <div className="flex gap-6">
                                                <a href="#" className="w-12 h-12 rounded-full border border-stone-200 flex items-center justify-center text-stone-400 hover:text-orange-700 hover:border-orange-700 transition-all"><i data-lucide="instagram" className="w-5 h-5"></i></a>
                                                <a href="#" className="w-12 h-12 rounded-full border border-stone-200 flex items-center justify-center text-stone-400 hover:text-orange-700 hover:border-orange-700 transition-all"><i data-lucide="facebook" className="w-5 h-5"></i></a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        {/* Decorative Background Element */}
                        <div className="absolute -bottom-24 -left-24 text-[20rem] font-serif font-bold text-stone-100/50 pointer-events-none select-none z-0">
                            V.W
                        </div>
                    </section>

                    {/* Exhibitions & Announcements Section */}
                    <section id="exhibitions" className="relative py-40 px-6 md:px-12 overflow-hidden bg-stone-950">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&q=80&w=1600" 
                                className="w-full h-full object-cover opacity-20 filter grayscale" 
                                alt="Gallery Background"
                            />
                            <div className="absolute inset-0 bg-gradient-to-b from-white via-transparent to-[#f9f7f5] opacity-10"></div>
                        </div>

                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="flex flex-col mb-20 text-center md:text-left">
                                <h2 className="text-orange-500 font-bold tracking-[0.5em] uppercase text-[10px] mb-4">News & Events</h2>
                                <h3 className="text-6xl md:text-7xl font-serif leading-none italic text-white">Exhibitions</h3>
                            </div>
                            
                            <div className="grid grid-cols-1 gap-12 max-w-4xl">
                                {exhibitions.map((event, idx) => (
                                    <div key={idx} className="group relative bg-white/5 backdrop-blur-sm border border-white/10 p-8 md:p-12 hover:bg-white/10 transition-all duration-500 rounded-sm">
                                        <div className="flex flex-col md:flex-row md:items-start justify-between gap-8">
                                            <div className="flex-grow">
                                                <div className="flex items-center gap-4 mb-4">
                                                    <span className="h-[1px] w-8 bg-orange-500"></span>
                                                    <span className="text-orange-500 font-bold tracking-widest text-[11px] uppercase">{event.date}</span>
                                                </div>
                                                <h4 className="text-4xl md:text-5xl font-serif text-white mb-4 group-hover:text-orange-200 transition-colors leading-tight">
                                                    {event.title}
                                                </h4>
                                                <p className="text-orange-100/60 font-medium mb-6 tracking-wide text-lg italic">{event.location}</p>
                                                <p className="text-stone-300 font-light leading-relaxed text-lg max-w-2xl">
                                                    {event.description}
                                                </p>
                                            </div>
                                            <div className="flex flex-col items-start md:items-end">
                                                <a 
                                                    href={event.link} 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="inline-flex items-center gap-3 bg-white text-stone-900 px-8 py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-orange-500 hover:text-white transition-all shadow-xl"
                                                >
                                                    View Details <i data-lucide="external-link" className="w-3 h-3"></i>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Shop Section */}
                    <section id="shop" className="py-32 px-6 md:px-12 bg-[#f9f7f5] scroll-mt-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 border-b border-stone-200 pb-12">
                                <div>
                                    <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Official Store</h2>
                                    <h3 className="text-5xl font-serif leading-none italic">
                                        {view === 'categories' ? 'Curated Collections' : activeCategory}
                                    </h3>
                                </div>
                                {view === 'products' && (
                                    <button 
                                        onClick={() => setView('categories')}
                                        className="flex items-center gap-2 text-stone-400 hover:text-orange-700 font-bold uppercase tracking-widest text-[10px] transition-colors"
                                    >
                                        <i data-lucide="arrow-left" className="w-3 h-3"></i> Back to Collections
                                    </button>
                                )}
                            </div>

                            {view === 'categories' ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {categories.map((cat) => (
                                        <div 
                                            key={cat.id} 
                                            onClick={() => handleCategoryClick(cat)}
                                            className="category-card group cursor-pointer flex flex-col h-full bg-white border border-stone-100 p-4 transition-all hover:shadow-2xl"
                                        >
                                            <div className="relative overflow-hidden mb-6 aspect-[4/5] bg-stone-200">
                                                <img src={cat.img} alt={cat.name} className="w-full h-full object-cover transition-transform duration-700" />
                                                <div className="absolute inset-0 bg-stone-900/10 group-hover:bg-transparent transition-colors"></div>
                                            </div>
                                            <h4 className="text-xl font-serif mb-2 group-hover:text-orange-700 transition-colors">{cat.name}</h4>
                                            <p className="text-stone-500 text-sm font-light leading-relaxed mb-6 flex-grow">{cat.description}</p>
                                            <div className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-stone-900 group-hover:text-orange-700 transition-colors">
                                                {cat.isLink ? 'Commission Work' : 'Explore Gallery'} <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-16 animate-fade-in">
                                    {filteredProducts.map((item) => (
                                        <div key={item.id} className="group flex flex-col h-full bg-white p-6 shadow-sm border border-stone-100">
                                            <div className="relative overflow-hidden mb-6 rounded-sm bg-stone-100">
                                                <img src={item.img} alt={item.title} className="w-full aspect-square object-cover transform group-hover:scale-[1.05] transition-transform duration-[1.5s]" />
                                            </div>
                                            <h4 className="text-2xl font-serif mb-2">{item.title}</h4>
                                            <p className="text-stone-500 font-bold text-sm mb-2">${item.price.toFixed(2)} CAD</p>
                                            <p className="text-stone-400 text-xs uppercase tracking-widest mb-8">{item.medium}</p>
                                            <a href={item.squareUrl} target="_blank" className="block text-center w-full bg-stone-900 text-white py-4 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-700 transition-colors mt-auto">
                                                Purchase
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Workshops Section */}
                    <section id="workshops" className="relative py-32 flex items-center justify-center overflow-hidden bg-stone-900">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=1600" className="w-full h-full object-cover filter brightness-[0.25]" alt="Art Studio Background" />
                        </div>
                        <div className="relative z-10 max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-xs mb-6">Education & Mentorship</h2>
                            <h3 className="text-5xl md:text-6xl font-serif text-white leading-tight mb-8">Learn the <span className="italic text-orange-200">Alchemy</span></h3>
                            <p className="text-stone-300 text-lg md:text-xl font-light leading-relaxed mb-10 max-w-2xl mx-auto">
                                Victoria offers professional instruction and private mentorship in specialized mediums, including Encaustic and Acrylics. Sessions are available via Zoom or in-person at her Hamilton studio.
                            </p>
                            <a href="#contact" className="inline-flex items-center gap-3 bg-orange-700 text-white px-10 py-4 rounded-sm font-bold uppercase tracking-widest text-[10px] hover:bg-orange-600 transition-colors shadow-2xl">
                                Inquire about Workshops <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </a>
                        </div>
                    </section>

                    {/* Credentials Section */}
                    <section id="credentials" className="py-32 px-6 md:px-12 border-t border-stone-100 bg-white">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16">
                            <div className="lg:col-span-7">
                                <h2 className="text-orange-700 font-bold tracking-[0.4em] uppercase text-xs mb-8">Curriculum Vitae</h2>
                                <h3 className="text-4xl font-serif mb-12">Professional Affiliations</h3>
                                <ul className="space-y-6 text-sm font-light text-stone-600">
                                    {[
                                        ["2018–Present", "Elected Member, Ontario Society of Artists & Society of Canadian Artists"],
                                        ["2013–Present", "Art Instructor, Fleming College - Haliburton School of Art + Design"],
                                        ["2013–Present", "Golden Artist Educator at Golden Artist Colors"],
                                        ["2009–Present", "R&F Certified Encaustic Instructor"],
                                        ["2008–2023", "Co-Owner and Co-Founder, Victory Art Supply"],
                                        ["1985–1986", "Architectural Drafting, Humber College"],
                                        ["1983–1985", "Fine Art, George Brown College"]
                                    ].map(([year, text], idx) => (
                                        <li key={idx} className={`grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-4 ${idx !== 6 ? 'border-b border-stone-100 pb-6' : ''}`}>
                                            <span className="font-bold text-stone-900 tracking-widest text-xs uppercase">{year}</span>
                                            <span>{text}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-32 bg-[#1a1918] text-white px-6">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-orange-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Get In Touch</h2>
                                <h3 className="text-4xl md:text-6xl font-serif mb-8 leading-tight">Bring <span className="italic text-orange-200 font-light">The Uncanny</span> into your space.</h3>
                                <div className="space-y-8 mt-16">
                                    <div className="flex items-center gap-6">
                                        <i data-lucide="mail" className="text-orange-400 w-6 h-6"></i>
                                        <a href="mailto:Victoriawallaceartist@gmail.com" className="text-lg hover:text-orange-400 transition-colors underline underline-offset-8 decoration-stone-800">Victoriawallaceartist@gmail.com</a>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <i data-lucide="phone" className="text-orange-400 w-6 h-6"></i>
                                        <a href="tel:+17055595509" className="text-lg hover:text-orange-400 transition-colors">(705) 559-5509</a>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-stone-900 p-8 md:p-12 rounded-sm">
                                <form action="https://formsubmit.co/Victoriawallaceartist@gmail.com" method="POST" className="space-y-6">
                                    <input type="email" name="Email" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:border-orange-500 outline-none" placeholder="Email Address" />
                                    <textarea name="Message" rows="4" required className="w-full bg-stone-950 border border-stone-800 rounded-sm px-4 py-4 text-white focus:border-orange-500 outline-none resize-none" placeholder="Your Inquiry"></textarea>
                                    <button type="submit" className="w-full bg-orange-700 text-white py-5 font-bold uppercase tracking-widest text-[10px] hover:bg-orange-600 transition-colors rounded-sm">
                                        Send Message
                                    </button>
                                </form>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 bg-stone-950 text-stone-500 text-[10px] tracking-[0.3em] uppercase font-bold text-center">
                        <p>© Victoria Wallace Art • OSA • SCA</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
